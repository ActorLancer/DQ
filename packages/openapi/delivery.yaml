          nullable: true
        recipient_ref:
          type: string
          nullable: true
        subscriber_ref:
          type: string
          nullable: true
        share_protocol:
          type: string
          nullable: true
        access_locator:
          type: string
          nullable: true
        scope_json:
          type: object
          additionalProperties: true
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        receipt_hash:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
    ManageShareGrantResponseEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/ManageShareGrantResponse'
    ManageShareGrantResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ShareGrantResponseData'
    GetShareGrantResponseEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
