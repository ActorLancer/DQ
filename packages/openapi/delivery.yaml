openapi: 3.1.0
info:
  title: DataB Delivery API
  version: 1.0.0
  description: >-
    Delivery module baseline for V1. DLV-001 freezes storage-gateway shared
    schemas; DLV-002 adds the file-delivery commit endpoint; DLV-003 adds
    short-lived download-ticket issuance backed by Redis cache; DLV-004 adds
    ticket-validated file download with delivery-receipt logging.
servers:
  - url: http://127.0.0.1:8080
paths:
  /api/v1/orders/{id}/deliver:
    post:
      summary: Commit file delivery for a deliverable order
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitOrderDeliveryRequest'
      responses:
        '200':
          description: Delivery committed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitOrderDeliveryResponseEnvelope'
        '400':
          description: Invalid payload or delivery persistence conflict
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order not found
        '409':
          description: Order state does not allow file delivery commit
  /api/v1/orders/{id}/download-ticket:
    get:
      summary: Issue a short-lived download ticket for a committed file delivery
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Download ticket issued and cached in Redis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadTicketResponseEnvelope'
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order not found
        '409':
          description: Ticket expired, exhausted, or current order state does not allow issuance
        '500':
          description: Redis cache write failed
  /api/v1/orders/{id}/download:
    get:
      summary: Download a committed file delivery through the ticket-validated gateway
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: ticket
          in: query
          required: true
          schema:
            type: string
          description: Short-lived download token returned by the download-ticket API
      responses:
        '200':
          description: File payload fetched from MinIO and download receipt persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadFileResponseEnvelope'
        '403':
          description: Permission or tenant-scope forbidden
        '409':
          description: Ticket invalid, expired, exhausted, or current order state does not allow download
        '502':
          description: MinIO or object-store fetch failed
components:
  schemas:
    CommitOrderDeliveryRequest:
      type: object
      required:
        - branch
        - object_uri
        - size_bytes
        - content_hash
        - key_cipher
        - expire_at
        - download_limit
        - delivery_commit_hash
        - receipt_hash
      properties:
        branch:
          type: string
          enum: [file]
        object_uri:
          type: string
        content_type:
          type: string
          nullable: true
        size_bytes:
          type: integer
          format: int64
        content_hash:
          type: string
        encryption_algo:
          type: string
          nullable: true
        plaintext_visible_to_platform:
          type: boolean
          nullable: true
        storage_namespace_id:
          type: string
          format: uuid
          nullable: true
        key_cipher:
          type: string
        key_control_mode:
          type: string
          nullable: true
        unwrap_policy_json:
          type: object
          additionalProperties: true
          nullable: true
        key_version:
          type: string
          nullable: true
        expire_at:
          type: string
          format: date-time
        download_limit:
          type: integer
        delivery_commit_hash:
          type: string
        receipt_hash:
          type: string
    CommitOrderDeliveryResponseEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/CommitOrderDeliveryResponse'
    CommitOrderDeliveryResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/CommitOrderDeliveryResponseData'
    CommitOrderDeliveryResponseData:
      type: object
      required:
        - order_id
        - delivery_id
        - object_id
        - envelope_id
        - ticket_id
        - branch
        - previous_state
        - current_state
        - payment_status
        - delivery_status
        - acceptance_status
        - settlement_status
        - dispute_status
        - bucket_name
        - object_key
        - expires_at
        - download_limit
        - receipt_hash
        - delivery_commit_hash
        - committed_at
      properties:
        order_id:
          type: string
          format: uuid
        delivery_id:
          type: string
          format: uuid
        object_id:
          type: string
          format: uuid
        envelope_id:
          type: string
          format: uuid
        ticket_id:
          type: string
          format: uuid
        branch:
          type: string
        previous_state:
          type: string
        current_state:
          type: string
        payment_status:
          type: string
        delivery_status:
          type: string
        acceptance_status:
          type: string
        settlement_status:
          type: string
        dispute_status:
          type: string
        bucket_name:
          type: string
        object_key:
          type: string
        expires_at:
          type: string
          format: date-time
        download_limit:
          type: integer
        receipt_hash:
          type: string
        delivery_commit_hash:
          type: string
        committed_at:
          type: string
          format: date-time
    DownloadTicketResponseEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/DownloadTicketResponse'
    DownloadTicketResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/DownloadTicketResponseData'
    DownloadTicketResponseData:
      type: object
      required:
        - order_id
        - delivery_id
        - ticket_id
        - download_token
        - ticket_status
        - issued_at
        - expire_at
        - download_limit
        - download_count
        - remaining_downloads
        - bucket_name
        - object_key
        - envelope_id
        - delivery_commit_hash
      properties:
        order_id:
          type: string
          format: uuid
        delivery_id:
          type: string
          format: uuid
        ticket_id:
          type: string
          format: uuid
        download_token:
          type: string
        ticket_status:
          type: string
        issued_at:
          type: string
          format: date-time
        expire_at:
          type: string
          format: date-time
        download_limit:
          type: integer
        download_count:
          type: integer
        remaining_downloads:
          type: integer
        bucket_name:
          type: string
        object_key:
          type: string
        envelope_id:
          type: string
          format: uuid
        delivery_commit_hash:
          type: string
    DownloadFileResponseEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/DownloadFileResponse'
    DownloadFileResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/DownloadFileResponseData'
    DownloadFileResponseData:
      type: object
      required:
        - order_id
        - delivery_id
        - ticket_id
        - receipt_id
        - receipt_hash
        - downloaded_at
        - ticket_status
        - download_limit
        - download_count
        - remaining_downloads
        - bucket_name
        - object_key
        - content_hash
        - delivery_commit_hash
        - key_envelope
        - object_base64
      properties:
        order_id:
          type: string
          format: uuid
        delivery_id:
          type: string
          format: uuid
        ticket_id:
          type: string
          format: uuid
        receipt_id:
          type: string
          format: uuid
        receipt_hash:
          type: string
        downloaded_at:
          type: string
          format: date-time
        ticket_status:
          type: string
        download_limit:
          type: integer
        download_count:
          type: integer
        remaining_downloads:
          type: integer
        bucket_name:
          type: string
        object_key:
          type: string
        content_type:
          type: string
          nullable: true
        content_hash:
          type: string
        delivery_commit_hash:
          type: string
        key_envelope:
          $ref: '#/components/schemas/DownloadKeyEnvelopeData'
        object_base64:
          type: string
    DownloadKeyEnvelopeData:
      type: object
      required: [envelope_id, key_cipher, unwrap_policy_json]
      properties:
        envelope_id:
          type: string
          format: uuid
        key_cipher:
          type: string
        key_control_mode:
          type: string
          nullable: true
        unwrap_policy_json:
          type: object
          additionalProperties: true
        key_version:
          type: string
          nullable: true
    StorageGatewaySnapshot:
      type: object
      required: [integrity, watermark_policy, access_audit]
      properties:
        object_locator:
          $ref: '#/components/schemas/StorageGatewayObjectLocator'
        integrity:
          $ref: '#/components/schemas/StorageGatewayIntegrity'
        watermark_policy:
          $ref: '#/components/schemas/StorageGatewayWatermarkPolicy'
        download_restriction:
          $ref: '#/components/schemas/StorageGatewayDownloadRestriction'
        access_audit:
          $ref: '#/components/schemas/StorageGatewayAccessAudit'
    StorageGatewayObjectLocator:
      type: object
      required: [object_id, object_uri, location_type, storage_zone, plaintext_visible_to_platform]
      properties:
        object_id:
          type: string
          format: uuid
        object_uri:
          type: string
        bucket_name:
          type: string
          nullable: true
        object_key:
          type: string
          nullable: true
        location_type:
          type: string
        storage_zone:
          type: string
        provider_type:
          type: string
          nullable: true
        namespace_name:
          type: string
          nullable: true
        namespace_kind:
          type: string
          nullable: true
        content_type:
          type: string
          nullable: true
        size_bytes:
          type: integer
          format: int64
          nullable: true
        plaintext_visible_to_platform:
          type: boolean
    StorageGatewayIntegrity:
      type: object
      properties:
        content_hash:
          type: string
          nullable: true
        encryption_algo:
          type: string
          nullable: true
        delivery_commit_hash:
          type: string
          nullable: true
        receipt_hash:
          type: string
          nullable: true
        envelope_id:
          type: string
          format: uuid
          nullable: true
    StorageGatewayWatermarkPolicy:
      type: object
      required: [mode, rule, fingerprint_fields, sensitive_delivery_mode, disclosure_review_status]
      properties:
        mode:
          type: string
        rule:
          type: object
          additionalProperties: true
        fingerprint_fields:
          type: array
          items:
            type: string
        watermark_hash:
          type: string
          nullable: true
        sensitive_delivery_mode:
          type: string
        disclosure_review_status:
          type: string
    StorageGatewayDownloadRestriction:
      type: object
      required: [ticket_id, expire_at, download_limit, download_count, remaining_downloads, current_status]
      properties:
        ticket_id:
          type: string
          format: uuid
        expire_at:
          type: string
          format: date-time
        download_limit:
          type: integer
        download_count:
          type: integer
        remaining_downloads:
          type: integer
        current_status:
          type: string
    StorageGatewayAccessAudit:
      type: object
      required: [access_count]
      properties:
        access_count:
          type: integer
          format: int64
        last_downloaded_at:
          type: string
          format: date-time
          nullable: true
        last_client_fingerprint:
          type: string
          nullable: true
