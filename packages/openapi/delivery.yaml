          type: string
          format: uuid
        order_id:
          type: string
          format: uuid
        asset_object_id:
          type: string
          format: uuid
        sku_id:
          type: string
          format: uuid
        sku_type:
          type: string
        recipient_ref:
          type: string
        subscriber_ref:
          type: string
          nullable: true
        share_protocol:
          type: string
        access_locator:
          type: string
          nullable: true
        grant_status:
          type: string
        read_only:
          type: boolean
        receipt_hash:
          type: string
          nullable: true
        granted_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        operation:
          type: string
          nullable: true
        current_state:
          type: string
        payment_status:
          type: string
        delivery_status:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ManageRevisionSubscriptionRequest:
      type: object
