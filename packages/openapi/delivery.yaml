        asset_object_id:
          type: string
          format: uuid
          nullable: true
        app_id:
          type: string
          format: uuid
          nullable: true
        app_name:
          type: string
          nullable: true
        app_type:
          type: string
          nullable: true
        client_id:
          type: string
          nullable: true
        quota_json:
          type: object
          additionalProperties: true
          nullable: true
        rate_limit_json:
          type: object
          additionalProperties: true
          nullable: true
        upstream_mode:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
    CommitOrderDeliveryResponseEnvelope:
      type: object
      required: [success, data]
      properties:
