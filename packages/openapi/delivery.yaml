          format: uuid
          nullable: true
        envelope_id:
          type: string
          format: uuid
          nullable: true
        ticket_id:
          type: string
          format: uuid
          nullable: true
        branch:
          type: string
        previous_state:
          type: string
        current_state:
          type: string
        payment_status:
          type: string
        delivery_status:
          type: string
        acceptance_status:
