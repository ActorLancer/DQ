        order_id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        sku_id:
          type: string
          format: uuid
        sku_type:
          type: string
        cadence:
          type: string
        delivery_channel:
          type: string
        start_version_no:
          type: integer
        last_delivered_version_no:
          type: integer
          nullable: true
        current_version_no:
          type: integer
        next_delivery_at:
          type: string
          format: date-time
        subscription_status:
          type: string
        current_state:
          type: string
        payment_status:
          type: string
        operation:
