openapi: 3.1.0
info:
  title: IAM API
  version: v1
paths:
  /api/v1/orgs/register:
    post:
      summary: Register organization
      operationId: registerOrganization
      responses:
        "200":
          description: Organization registered
        "403":
          description: Permission denied
  /api/v1/iam/orgs/{id}/party-review-linkage:
    patch:
      summary: Patch party-review linkage fields on organization
      operationId: patchOrgPartyReviewLinkage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Organization linkage patched
        "404":
          description: Not found
  /api/v1/auth/login:
    post:
      summary: Local/mock login placeholder
      operationId: authLogin
      responses:
        "200":
          description: Login session created
        "401":
          description: Unauthorized
  /api/v1/auth/logout:
    post:
      summary: Local/mock logout placeholder
      operationId: authLogout
      responses:
        "200":
          description: Session revoked
        "404":
          description: Not found
  /api/v1/iam/orgs/{id}:
    get:
      summary: Get organization aggregate
      description: >
        Returns the formal organization aggregate used by the subject review
        workbench. The view mirrors the backend `OrganizationAggregateView` and
        includes admission status, jurisdiction, certification/compliance
        levels, risk/review linkage fields, blacklist activity and timestamps.
      operationId: getOrganization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Organization aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOrganizationAggregateView"
              examples:
                pending_subject_review:
                  value:
                    success: true
                    data:
                      org_id: "33333333-3333-3333-3333-333333333333"
                      org_name: "WEB-008 Data Supplier"
                      org_type: "seller"
                      org_status: "pending_review"
                      jurisdiction_code: "CN"
                      compliance_level: "L2"
                      certification_level: "verified_basic"
                      whitelist_refs: []
                      graylist_refs: ["risk-ticket-demo"]
                      blacklist_refs: []
                      review_status: "manual_review"
                      risk_status: "watch"
                      sellable_status: "restricted"
                      freeze_reason: null
                      blacklist_active: false
                      created_at: "2026-04-23T00:00:00.000Z"
                      updated_at: "2026-04-23T00:00:00.000Z"
        "404":
          description: Not found
  /api/v1/iam/orgs:
    get:
      summary: List organizations
      description: >
        Lists organization aggregates for console review pages. V1 supports
        filtering by organization status and organization type; callers use this
        endpoint for subject admission queues instead of reading PostgreSQL
        directly.
      operationId: listOrganizations
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: Organization status filter, for example `pending_review`.
        - name: org_type
          in: query
          required: false
          schema:
            type: string
          description: Organization type filter, for example `seller` or `buyer`.
      responses:
        "200":
          description: Organization list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOrganizationAggregateViewList"
              examples:
                pending_subjects:
                  value:
                    success: true
                    data:
                      - org_id: "33333333-3333-3333-3333-333333333333"
                        org_name: "WEB-008 Data Supplier"
                        org_type: "seller"
                        org_status: "pending_review"
                        jurisdiction_code: "CN"
                        compliance_level: "L2"
                        certification_level: "verified_basic"
                        whitelist_refs: []
                        graylist_refs: ["risk-ticket-demo"]
                        blacklist_refs: []
                        review_status: "manual_review"
                        risk_status: "watch"
                        sellable_status: "restricted"
                        freeze_reason: null
                        blacklist_active: false
                        created_at: "2026-04-23T00:00:00.000Z"
                        updated_at: "2026-04-23T00:00:00.000Z"
  /api/v1/iam/departments:
    get:
      summary: List departments
      operationId: listDepartments
      responses:
        "200":
          description: Department list
    post:
      summary: Create department
      operationId: createDepartment
      responses:
        "200":
          description: Department created
  /api/v1/iam/departments/{id}:
    get:
      summary: Get department
      operationId: getDepartment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Department detail
        "404":
          description: Not found
  /api/v1/iam/users:
    get:
      summary: List users
      operationId: listUsers
      responses:
        "200":
          description: User list
    post:
      summary: Create user
      operationId: createUser
      responses:
        "200":
          description: User created
  /api/v1/iam/users/{id}:
    get:
      summary: Get user
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User detail
        "404":
          description: Not found
  /api/v1/iam/users/{id}/roles:
    post:
      summary: Update user role snapshot (placeholder)
      operationId: updateUserRoles
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User role snapshot updated
        "404":
          description: Not found
  /api/v1/apps:
    get:
      summary: List applications
      description: List developer/test applications visible to the current tenant scope.
      operationId: listApplications
      parameters:
        - name: org_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Application list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseApplicationViewList"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create application
      description: Create a developer/test application. Write callers must provide an idempotency key and the platform records an audit event.
      operationId: createApplication
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - name: X-Step-Up-Token
          in: header
          required: false
          schema:
            type: string
        - name: X-Step-Up-Challenge-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationRequest"
      responses:
        "200":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseApplicationView"
        "400":
          description: Invalid request or missing idempotency context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/apps/{id}:
    get:
      summary: Get application
      operationId: getApplication
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Application detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseApplicationView"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Patch application
      description: Update a developer/test application. Write callers must provide an idempotency key and the platform records an audit event.
      operationId: patchApplication
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - name: X-Step-Up-Token
          in: header
          required: false
          schema:
            type: string
        - name: X-Step-Up-Challenge-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchApplicationRequest"
      responses:
        "200":
          description: Application patched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseApplicationView"
        "400":
          description: Invalid request or missing idempotency context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/apps/{id}/credentials/rotate:
    post:
      summary: Rotate application secret
      description: Rotate an application API secret hash. The response only exposes secret status and never returns plaintext secret material.
      operationId: rotateApplicationSecret
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - name: X-Step-Up-Token
          in: header
          required: false
          schema:
            type: string
        - name: X-Step-Up-Challenge-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotateApplicationSecretRequest"
      responses:
        "200":
          description: Application secret rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseApplicationView"
        "400":
          description: Invalid request or missing idempotency context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/apps/{id}/credentials/revoke:
    post:
      summary: Revoke application secret
      description: Revoke an application API secret hash. The response only exposes secret status and never returns plaintext secret material.
      operationId: revokeApplicationSecret
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - name: X-Step-Up-Token
          in: header
          required: false
          schema:
            type: string
        - name: X-Step-Up-Challenge-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Application secret revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseApplicationView"
        "400":
          description: Invalid request or missing idempotency context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/users/invite:
    post:
      summary: Invite user shortcut endpoint
      operationId: inviteUser
      responses:
        "200":
          description: Invitation created
  /api/v1/iam/invitations:
    post:
      summary: Create invitation
      operationId: createInvitation
      responses:
        "200":
          description: Invitation created
    get:
      summary: List invitations
      operationId: listInvitations
      responses:
        "200":
          description: Invitation list
  /api/v1/iam/invitations/{id}/cancel:
    post:
      summary: Cancel invitation
      operationId: cancelInvitation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invitation cancelled
        "404":
          description: Not found
  /api/v1/iam/sessions:
    get:
      summary: List sessions
      operationId: listSessions
      responses:
        "200":
          description: Session list
  /api/v1/iam/sessions/{id}/revoke:
    post:
      summary: Revoke session
      operationId: revokeSession
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Session revoked
        "404":
          description: Not found
  /api/v1/iam/devices:
    get:
      summary: List trusted devices
      operationId: listTrustedDevices
      responses:
        "200":
          description: Device list
  /api/v1/iam/devices/{id}/revoke:
    post:
      summary: Revoke trusted device
      operationId: revokeTrustedDevice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Device revoked
        "404":
          description: Not found
  /api/v1/iam/access/rules:
    get:
      summary: List IAM access permission rules
      operationId: listIamAccessRules
      responses:
        "200":
          description: Access rules
  /api/v1/iam/access/check:
    post:
      summary: Evaluate role/scope/api/button access
      operationId: checkIamAccessRule
      responses:
        "200":
          description: Access check result
  /api/v1/iam/rbac/seeds:
    get:
      summary: Inspect RBAC seed roles
      operationId: getIamRbacSeeds
      responses:
        "200":
          description: RBAC seed list
  /api/v1/iam/step-up/check:
    post:
      summary: Create/check step-up challenge for high-risk action (compat path)
      operationId: checkStepUp
      deprecated: true
      responses:
        "200":
          description: Step-up challenge status
  /api/v1/iam/step-up/challenges:
    post:
      summary: Create/check step-up challenge for high-risk action
      operationId: createStepUpChallenge
      responses:
        "200":
          description: Step-up challenge status
  /api/v1/iam/step-up/challenges/{id}/verify:
    post:
      summary: Verify step-up challenge
      operationId: verifyStepUpChallenge
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Step-up verification result
        "404":
          description: Not found
  /api/v1/iam/mfa/authenticators:
    get:
      summary: List MFA authenticators
      operationId: listMfaAuthenticators
      responses:
        "200":
          description: MFA authenticators
    post:
      summary: Create MFA authenticator (mock/local)
      operationId: createMfaAuthenticator
      responses:
        "200":
          description: MFA authenticator created
  /api/v1/iam/mfa/authenticators/{id}:
    delete:
      summary: Revoke MFA authenticator
      operationId: deleteMfaAuthenticator
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: MFA authenticator revoked
        "404":
          description: Not found
  /api/v1/iam/sso/connections:
    post:
      summary: Create SSO connection placeholder
      operationId: createSsoConnection
      responses:
        "200":
          description: SSO connection created
    get:
      summary: List SSO connections
      operationId: listSsoConnections
      responses:
        "200":
          description: SSO connection list
  /api/v1/iam/sso/connections/{id}:
    patch:
      summary: Patch SSO connection placeholder
      operationId: patchSsoConnection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SSO connection patched
        "404":
          description: Not found
  /api/v1/iam/fabric-identities:
    get:
      summary: List fabric identity bindings
      operationId: listFabricIdentities
      responses:
        "200":
          description: Fabric identity list
  /api/v1/iam/fabric-identities/{id}/issue:
    post:
      summary: Issue fabric identity
      operationId: issueFabricIdentity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Fabric identity issued
        "400":
          description: Step-up challenge or actor context missing
        "403":
          description: Forbidden
        "404":
          description: Not found
        "409":
          description: Identity not approved for issue
  /api/v1/iam/fabric-identities/{id}/revoke:
    post:
      summary: Revoke fabric identity
      operationId: revokeFabricIdentity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Fabric identity revoked
        "400":
          description: Step-up challenge or actor context missing
        "403":
          description: Forbidden
        "404":
          description: Not found
        "409":
          description: Identity not in issued state
  /api/v1/iam/certificates:
    get:
      summary: List certificates
      operationId: listCertificates
      responses:
        "200":
          description: Certificate list
  /api/v1/iam/certificates/{id}/revoke:
    post:
      summary: Revoke certificate
      operationId: revokeCertificate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Certificate revoked
        "400":
          description: Step-up challenge or actor context missing
        "403":
          description: Forbidden
        "404":
          description: Not found
        "409":
          description: Certificate not in active state
  /api/v1/iam/connectors:
    get:
      summary: List connectors
      operationId: listConnectors
      responses:
        "200":
          description: Connector list
    post:
      summary: Create connector
      operationId: createConnector
      responses:
        "200":
          description: Connector created
  /api/v1/iam/connectors/{id}:
    get:
      summary: Get connector
      operationId: getConnector
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Connector detail
        "404":
          description: Not found
  /api/v1/iam/execution-environments:
    get:
      summary: List execution environments
      operationId: listExecutionEnvironments
      responses:
        "200":
          description: Execution environment list
    post:
      summary: Create execution environment
      operationId: createExecutionEnvironment
      responses:
        "200":
          description: Execution environment created
  /api/v1/iam/execution-environments/{id}:
    get:
      summary: Get execution environment
      operationId: getExecutionEnvironment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Execution environment detail
        "404":
          description: Not found
  /api/v1/auth/me:
    get:
      summary: Resolve login context mirror
      description: >
        Returns the current browser/API session context mirror for portal and console
        identity strips. `Bearer` requests resolve `mode=jwt_mirror`; local test
        requests using `x-login-id` resolve `mode=local_test_user`. The response is
        the formal V1 source for current subject, roles, tenant/org scope, and
        `auth_context_level`.
      operationId: getAuthMe
      responses:
        "200":
          description: Session context resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSessionContextView"
              examples:
                jwt_mirror:
                  value:
                    success: true
                    data:
                      mode: jwt_mirror
                      user_id: "11111111-1111-1111-1111-111111111111"
                      org_id: null
                      login_id: null
                      display_name: null
                      tenant_id: "tenant-demo"
                      roles: ["tenant_developer"]
                      auth_context_level: "aal1"
                local_test_user:
                  value:
                    success: true
                    data:
                      mode: local_test_user
                      user_id: "22222222-2222-2222-2222-222222222222"
                      org_id: "33333333-3333-3333-3333-333333333333"
                      login_id: "buyer.demo"
                      display_name: "Buyer Demo"
                      tenant_id: null
                      roles: ["tenant_admin"]
                      auth_context_level: "aal1"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    OrganizationAggregateView:
      type: object
      required:
        - org_id
        - org_name
        - org_type
        - org_status
        - whitelist_refs
        - graylist_refs
        - blacklist_refs
        - blacklist_active
        - created_at
        - updated_at
      properties:
        org_id:
          type: string
          format: uuid
        org_name:
          type: string
        org_type:
          type: string
        org_status:
          type: string
        jurisdiction_code:
          type: string
          nullable: true
        compliance_level:
          type: string
          nullable: true
        certification_level:
          type: string
          nullable: true
        whitelist_refs:
          type: array
          items:
            type: string
        graylist_refs:
          type: array
          items:
            type: string
        blacklist_refs:
          type: array
          items:
            type: string
        review_status:
          type: string
          nullable: true
        risk_status:
          type: string
          nullable: true
        sellable_status:
          type: string
          nullable: true
        freeze_reason:
          type: string
          nullable: true
        blacklist_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ApiResponseOrganizationAggregateView:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/OrganizationAggregateView"
    ApiResponseOrganizationAggregateViewList:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationAggregateView"
    ApplicationView:
      type: object
      required:
        - app_id
        - org_id
        - app_name
        - app_type
        - status
        - client_id
        - client_secret_status
      properties:
        app_id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        app_name:
          type: string
        app_type:
          type: string
          description: Application category such as `api_client`; values are owned by IAM.
        status:
          type: string
          description: Application lifecycle status as stored by IAM.
        client_id:
          type: string
        client_secret_status:
          type: string
          description: Secret material status mirror; plaintext secrets are never returned.
    CreateApplicationRequest:
      type: object
      required:
        - org_id
        - app_name
        - client_id
      properties:
        org_id:
          type: string
          format: uuid
        app_name:
          type: string
        app_type:
          type: string
          nullable: true
          default: api_client
        client_id:
          type: string
        client_secret_hash:
          type: string
          nullable: true
          description: Pre-hashed secret material. Plaintext secrets must not be sent to or returned from the web client.
    PatchApplicationRequest:
      type: object
      properties:
        app_name:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
    RotateApplicationSecretRequest:
      type: object
      properties:
        client_secret_hash:
          type: string
          nullable: true
          description: Optional pre-hashed replacement secret. If omitted, IAM generates internal secret material and returns only status.
    ApiResponseApplicationView:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/ApplicationView"
    ApiResponseApplicationViewList:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationView"
    SessionContextView:
      type: object
      required:
        - mode
        - roles
        - auth_context_level
      properties:
        mode:
          type: string
          description: >
            Session mirror mode. `jwt_mirror` is resolved from a Bearer token;
            `local_test_user` is resolved from local test identity headers.
          enum: [jwt_mirror, local_test_user]
        user_id:
          type: string
          format: uuid
          nullable: true
        org_id:
          type: string
          format: uuid
          nullable: true
        login_id:
          type: string
          nullable: true
        display_name:
          type: string
          nullable: true
        tenant_id:
          type: string
          nullable: true
        roles:
          type: array
          items:
            type: string
        auth_context_level:
          type: string
          description: Current authentication assurance / context level.
    ApiResponseSessionContextView:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/SessionContextView"
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
          nullable: true
