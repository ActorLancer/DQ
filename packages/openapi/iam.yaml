openapi: 3.1.0
info:
  title: IAM API
  version: v1
paths:
  /api/v1/orgs/register:
    post:
      summary: Register organization
      operationId: registerOrganization
      responses:
        "200":
          description: Organization registered
        "403":
          description: Permission denied
  /api/v1/iam/orgs/{id}/party-review-linkage:
    patch:
      summary: Patch party-review linkage fields on organization
      operationId: patchOrgPartyReviewLinkage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Organization linkage patched
        "404":
          description: Not found
  /api/v1/auth/login:
    post:
      summary: Local/mock login placeholder
      operationId: authLogin
      responses:
        "200":
          description: Login session created
        "401":
          description: Unauthorized
  /api/v1/auth/logout:
    post:
      summary: Local/mock logout placeholder
      operationId: authLogout
      responses:
        "200":
          description: Session revoked
        "404":
          description: Not found
  /api/v1/iam/orgs/{id}:
    get:
      summary: Get organization aggregate
      operationId: getOrganization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Organization aggregate
        "404":
          description: Not found
  /api/v1/iam/orgs:
    get:
      summary: List organizations
      operationId: listOrganizations
      responses:
        "200":
          description: Organization list
  /api/v1/iam/departments:
    get:
      summary: List departments
      operationId: listDepartments
      responses:
        "200":
          description: Department list
    post:
      summary: Create department
      operationId: createDepartment
      responses:
        "200":
          description: Department created
  /api/v1/iam/departments/{id}:
    get:
      summary: Get department
      operationId: getDepartment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Department detail
        "404":
          description: Not found
  /api/v1/iam/users:
    get:
      summary: List users
      operationId: listUsers
      responses:
        "200":
          description: User list
    post:
      summary: Create user
      operationId: createUser
      responses:
        "200":
          description: User created
  /api/v1/iam/users/{id}:
    get:
      summary: Get user
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User detail
        "404":
          description: Not found
  /api/v1/iam/users/{id}/roles:
    post:
      summary: Update user role snapshot (placeholder)
      operationId: updateUserRoles
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User role snapshot updated
        "404":
          description: Not found
  /api/v1/apps:
    get:
      summary: List applications
      operationId: listApplications
      responses:
        "200":
          description: Application list
    post:
      summary: Create application
      operationId: createApplication
      responses:
        "200":
          description: Application created
  /api/v1/apps/{id}:
    get:
      summary: Get application
      operationId: getApplication
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Application detail
        "404":
          description: Not found
    patch:
      summary: Patch application
      operationId: patchApplication
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Application patched
        "404":
          description: Not found
  /api/v1/apps/{id}/credentials/rotate:
    post:
      summary: Rotate application secret
      operationId: rotateApplicationSecret
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Application secret rotated
        "404":
          description: Not found
  /api/v1/apps/{id}/credentials/revoke:
    post:
      summary: Revoke application secret
      operationId: revokeApplicationSecret
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Application secret revoked
        "404":
          description: Not found
  /api/v1/users/invite:
    post:
      summary: Invite user shortcut endpoint
      operationId: inviteUser
      responses:
        "200":
          description: Invitation created
  /api/v1/iam/invitations:
    post:
      summary: Create invitation
      operationId: createInvitation
      responses:
        "200":
          description: Invitation created
    get:
      summary: List invitations
      operationId: listInvitations
      responses:
        "200":
          description: Invitation list
  /api/v1/iam/invitations/{id}/cancel:
    post:
      summary: Cancel invitation
      operationId: cancelInvitation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invitation cancelled
        "404":
          description: Not found
  /api/v1/iam/sessions:
    get:
      summary: List sessions
      operationId: listSessions
      responses:
        "200":
          description: Session list
  /api/v1/iam/sessions/{id}/revoke:
    post:
      summary: Revoke session
      operationId: revokeSession
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Session revoked
        "404":
          description: Not found
  /api/v1/iam/devices:
    get:
      summary: List trusted devices
      operationId: listTrustedDevices
      responses:
        "200":
          description: Device list
  /api/v1/iam/devices/{id}/revoke:
    post:
      summary: Revoke trusted device
      operationId: revokeTrustedDevice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Device revoked
        "404":
          description: Not found
  /api/v1/iam/access/rules:
    get:
      summary: List IAM access permission rules
      operationId: listIamAccessRules
      responses:
        "200":
          description: Access rules
  /api/v1/iam/access/check:
    post:
      summary: Evaluate role/scope/api/button access
      operationId: checkIamAccessRule
      responses:
        "200":
          description: Access check result
  /api/v1/iam/rbac/seeds:
    get:
      summary: Inspect RBAC seed roles
      operationId: getIamRbacSeeds
      responses:
        "200":
          description: RBAC seed list
  /api/v1/iam/step-up/check:
    post:
      summary: Create/check step-up challenge for high-risk action (compat path)
      operationId: checkStepUp
      deprecated: true
      responses:
        "200":
          description: Step-up challenge status
  /api/v1/iam/step-up/challenges:
    post:
      summary: Create/check step-up challenge for high-risk action
      operationId: createStepUpChallenge
      responses:
        "200":
          description: Step-up challenge status
  /api/v1/iam/step-up/challenges/{id}/verify:
    post:
      summary: Verify step-up challenge
      operationId: verifyStepUpChallenge
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Step-up verification result
        "404":
          description: Not found
  /api/v1/iam/mfa/authenticators:
    get:
      summary: List MFA authenticators
      operationId: listMfaAuthenticators
      responses:
        "200":
          description: MFA authenticators
    post:
      summary: Create MFA authenticator (mock/local)
      operationId: createMfaAuthenticator
      responses:
        "200":
          description: MFA authenticator created
  /api/v1/iam/mfa/authenticators/{id}:
    delete:
      summary: Revoke MFA authenticator
      operationId: deleteMfaAuthenticator
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: MFA authenticator revoked
        "404":
          description: Not found
  /api/v1/iam/sso/connections:
    post:
      summary: Create SSO connection placeholder
      operationId: createSsoConnection
      responses:
        "200":
          description: SSO connection created
    get:
      summary: List SSO connections
      operationId: listSsoConnections
      responses:
        "200":
          description: SSO connection list
  /api/v1/iam/sso/connections/{id}:
    patch:
      summary: Patch SSO connection placeholder
      operationId: patchSsoConnection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SSO connection patched
        "404":
          description: Not found
  /api/v1/iam/fabric-identities:
    get:
      summary: List fabric identity bindings
      operationId: listFabricIdentities
      responses:
        "200":
          description: Fabric identity list
  /api/v1/iam/fabric-identities/{id}/issue:
    post:
      summary: Issue fabric identity
      operationId: issueFabricIdentity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Fabric identity issued
        "400":
          description: Step-up challenge or actor context missing
        "403":
          description: Forbidden
        "404":
          description: Not found
        "409":
          description: Identity not approved for issue
  /api/v1/iam/fabric-identities/{id}/revoke:
    post:
      summary: Revoke fabric identity
      operationId: revokeFabricIdentity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Fabric identity revoked
        "400":
          description: Step-up challenge or actor context missing
        "403":
          description: Forbidden
        "404":
          description: Not found
        "409":
          description: Identity not in issued state
  /api/v1/iam/certificates:
    get:
      summary: List certificates
      operationId: listCertificates
      responses:
        "200":
          description: Certificate list
  /api/v1/iam/certificates/{id}/revoke:
    post:
      summary: Revoke certificate
      operationId: revokeCertificate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Certificate revoked
        "400":
          description: Step-up challenge or actor context missing
        "403":
          description: Forbidden
        "404":
          description: Not found
        "409":
          description: Certificate not in active state
  /api/v1/iam/connectors:
    get:
      summary: List connectors
      operationId: listConnectors
      responses:
        "200":
          description: Connector list
    post:
      summary: Create connector
      operationId: createConnector
      responses:
        "200":
          description: Connector created
  /api/v1/iam/connectors/{id}:
    get:
      summary: Get connector
      operationId: getConnector
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Connector detail
        "404":
          description: Not found
  /api/v1/iam/execution-environments:
    get:
      summary: List execution environments
      operationId: listExecutionEnvironments
      responses:
        "200":
          description: Execution environment list
    post:
      summary: Create execution environment
      operationId: createExecutionEnvironment
      responses:
        "200":
          description: Execution environment created
  /api/v1/iam/execution-environments/{id}:
    get:
      summary: Get execution environment
      operationId: getExecutionEnvironment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Execution environment detail
        "404":
          description: Not found
  /api/v1/auth/me:
    get:
      summary: Resolve login context mirror
      operationId: getAuthMe
      responses:
        "200":
          description: Session context resolved
        "401":
          description: Unauthorized
