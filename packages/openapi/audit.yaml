openapi: 3.1.0
info:
  title: Audit API
  version: v1
paths:
  /api/v1/audit/orders/{id}:
    get:
      summary: lookup masked audit traces for one order
      description: >
        Returns the minimal audit trace view for a single order. Tenant-scoped callers
        must stay within the buyer or seller org bound to the order. Every lookup is
        mirrored into `audit.access_audit` and `ops.system_log`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: order audit traces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderAuditResponse"
        "400":
          description: bad request
        "403":
          description: forbidden
        "404":
          description: order not found
  /api/v1/audit/traces:
    get:
      summary: search masked audit traces
      description: >
        Returns the global masked audit trace search result. Supported filters cover
        `order_id`, `ref_type`, `ref_id`, `request_id`, `trace_id`, `action_name`,
        and `result_code`. Tenant-scoped callers must provide `order_id` or
        `ref_type=order + ref_id`.
      parameters:
        - name: order_id
          in: query
          schema:
            type: string
            format: uuid
        - name: ref_type
          in: query
          schema:
            type: string
        - name: ref_id
          in: query
          schema:
            type: string
            format: uuid
        - name: request_id
          in: query
          schema:
            type: string
        - name: trace_id
          in: query
          schema:
            type: string
        - name: action_name
          in: query
          schema:
            type: string
        - name: result_code
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: audit trace page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditTracePageResponse"
        "400":
          description: bad request
        "403":
          description: forbidden
  /api/v1/audit/packages/export:
    post:
      summary: export one audit evidence package
      description: >
        Creates one audit evidence package for an `order` or `dispute_case`, persists the
        exported package object into MinIO, records `audit.evidence_package`, and writes
        `audit.audit_event`, `audit.access_audit`, and `ops.system_log`. This is a high-risk
        control-plane action and requires `audit.package.export` plus `x-step-up-token` or a
        verified `x-step-up-challenge-id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuditPackageExportRequest"
      responses:
        "200":
          description: audit evidence package exported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditPackageExportResponse"
        "400":
          description: bad request
        "403":
          description: forbidden
        "404":
          description: target not found
  /api/v1/audit/replay-jobs:
    post:
      summary: create one audit replay job
      description: >
        Creates one audit replay dry-run for `order`, `case` / `dispute_case`,
        `evidence_package`, or another UUID-addressable audit object. `V1` only supports
        `dry_run=true`; any attempt to submit `dry_run=false` must fail with
        `AUDIT_REPLAY_DRY_RUN_ONLY`. Successful requests persist `audit.replay_job`,
        `audit.replay_result`, a replay report object in MinIO, and append
        `audit.audit_event`, `audit.access_audit`, and `ops.system_log`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuditReplayJobCreateRequest"
      responses:
        "200":
          description: replay job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditReplayJobDetailResponse"
        "400":
          description: bad request
        "403":
          description: forbidden
        "404":
          description: replay target not found
        "409":
          description: replay dry-run only
  /api/v1/audit/replay-jobs/{id}:
    get:
      summary: lookup one audit replay job
      description: >
        Returns one persisted replay job together with its replay results. Access is
        masked and mirrored into `audit.access_audit` plus `ops.system_log`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: replay job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditReplayJobDetailResponse"
        "400":
          description: bad request
        "403":
          description: forbidden
        "404":
          description: replay job not found
  /api/v1/audit/legal-holds:
    post:
      summary: create one legal hold
      description: >
        Creates one active `audit.legal_hold` for an `order` or `dispute_case` and appends one
        high-risk audit event plus one `ops.system_log` entry. Current hold state is resolved from
        `audit.legal_hold`; historical `audit.evidence_item` / `audit.evidence_package` rows stay
        append-only and are not updated in place. This control-plane action requires
        `audit.legal_hold.manage` together with `x-step-up-token` or a verified
        `x-step-up-challenge-id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuditLegalHoldCreateRequest"
      responses:
        "200":
          description: legal hold created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLegalHoldActionResponse"
        "400":
          description: bad request
        "403":
          description: forbidden
        "404":
          description: legal hold target not found
        "409":
          description: target already has one active legal hold (`AUDIT_LEGAL_HOLD_ACTIVE`)
  /api/v1/audit/legal-holds/{id}/release:
    post:
      summary: release one legal hold
      description: >
        Releases one active `audit.legal_hold`, writes the release reason and reviewer metadata,
        and appends one high-risk audit event plus one `ops.system_log` entry. Current hold state
        continues to be resolved from `audit.legal_hold`; historical evidence/package rows remain
        immutable. This action
        requires `audit.legal_hold.manage` and a verified step-up binding.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuditLegalHoldReleaseRequest"
      responses:
        "200":
          description: legal hold released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLegalHoldActionResponse"
        "400":
          description: bad request
        "403":
          description: forbidden
        "404":
          description: legal hold not found
        "409":
          description: legal hold is no longer active; duplicate create still uses `AUDIT_LEGAL_HOLD_ACTIVE`
components:
  schemas:
    AuditTrace:
      type: object
      required:
        - event_schema_version
        - event_class
        - domain_name
        - ref_type
        - action_name
        - result_code
      properties:
        audit_id:
          type: string
        event_schema_version:
          type: string
        event_class:
          type: string
        domain_name:
          type: string
        ref_type:
          type: string
        ref_id:
          type: string
        actor_id:
          type: string
        actor_org_id:
          type: string
        action_name:
          type: string
        result_code:
          type: string
        error_code:
          type: string
        request_id:
          type: string
        trace_id:
          type: string
        tx_hash:
          type: string
        evidence_manifest_id:
          type: string
        event_hash:
          type: string
        occurred_at:
          type: string
          format: date-time
    AuditTracePage:
      type: object
      required:
        - total
        - page
        - page_size
        - items
      properties:
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditTrace"
    OrderAuditView:
      type: object
      required:
        - order_id
        - buyer_org_id
        - seller_org_id
        - status
        - payment_status
        - total
        - page
        - page_size
        - traces
      properties:
        order_id:
          type: string
          format: uuid
        buyer_org_id:
          type: string
          format: uuid
        seller_org_id:
          type: string
          format: uuid
        status:
          type: string
        payment_status:
          type: string
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        traces:
          type: array
          items:
            $ref: "#/components/schemas/AuditTrace"
    AuditTracePageResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/AuditTracePage"
    OrderAuditResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/OrderAuditView"
    EvidenceManifest:
      type: object
      required:
        - manifest_scope
        - ref_type
        - manifest_hash
        - item_count
      properties:
        evidence_manifest_id:
          type: string
        manifest_scope:
          type: string
        ref_type:
          type: string
        ref_id:
          type: string
        manifest_hash:
          type: string
        item_count:
          type: integer
        storage_uri:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
    EvidencePackage:
      type: object
      required:
        - package_type
        - ref_type
        - retention_class
        - legal_hold_status
      properties:
        evidence_package_id:
          type: string
        package_type:
          type: string
        ref_type:
          type: string
        ref_id:
          type: string
        evidence_manifest_id:
          type: string
        package_digest:
          type: string
        storage_uri:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        retention_class:
          type: string
        legal_hold_status:
          type: string
        metadata:
          type: object
          additionalProperties: true
    AuditPackageExportRequest:
      type: object
      required:
        - ref_type
        - ref_id
        - reason
      properties:
        ref_type:
          type: string
          description: one of `order`, `case`, or `dispute_case`
        ref_id:
          type: string
          format: uuid
        reason:
          type: string
        masked_level:
          type: string
          enum:
            - summary
            - masked
            - unmasked
        package_type:
          type: string
    AuditPackageExportView:
      type: object
      required:
        - evidence_package
        - evidence_manifest
        - audit_trace_count
        - evidence_item_count
        - legal_hold_status
        - step_up_bound
      properties:
        evidence_package:
          $ref: "#/components/schemas/EvidencePackage"
        evidence_manifest:
          $ref: "#/components/schemas/EvidenceManifest"
        audit_trace_count:
          type: integer
        evidence_item_count:
          type: integer
        legal_hold_status:
          type: string
        step_up_bound:
          type: boolean
    AuditPackageExportResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/AuditPackageExportView"
    AuditReplayJobCreateRequest:
      type: object
      required:
        - replay_type
        - ref_type
        - ref_id
        - reason
      properties:
        replay_type:
          type: string
          enum:
            - forensic_replay
            - state_replay
            - reconciliation_replay
            - compensation_replay
        ref_type:
          type: string
          description: >
            Supports `order`, `case`, `dispute_case`, `evidence_package`, or another
            UUID-addressable audit object `ref_type`.
        ref_id:
          type: string
          format: uuid
        reason:
          type: string
        dry_run:
          type: boolean
          default: true
          description: `V1` only accepts `true`; `false` fails with `AUDIT_REPLAY_DRY_RUN_ONLY`.
        options:
          type: object
          additionalProperties: true
    ReplayJob:
      type: object
      required:
        - replay_job_id
        - replay_type
        - ref_type
        - dry_run
        - replay_status
        - options
      properties:
        replay_job_id:
          type: string
          format: uuid
        replay_type:
          type: string
        ref_type:
          type: string
        ref_id:
          type: string
          format: uuid
        dry_run:
          type: boolean
        replay_status:
          type: string
        created_by:
          type: string
          format: uuid
        request_reason:
          type: string
        step_up_challenge_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        options:
          type: object
          additionalProperties: true
    ReplayResult:
      type: object
      required:
        - replay_result_id
        - replay_job_id
        - step_name
        - result_code
        - diff_summary
      properties:
        replay_result_id:
          type: string
          format: uuid
        replay_job_id:
          type: string
          format: uuid
        step_name:
          type: string
          enum:
            - target_snapshot
            - audit_timeline
            - evidence_projection
            - execution_policy
        result_code:
          type: string
          description: >
            `execution_policy` always returns `AUDIT_REPLAY_DRY_RUN_ONLY` in `V1`.
        expected_digest:
          type: string
        actual_digest:
          type: string
        diff_summary:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    AuditReplayJobDetail:
      type: object
      required:
        - replay_job
        - results
      properties:
        replay_job:
          $ref: "#/components/schemas/ReplayJob"
        results:
          type: array
          items:
            $ref: "#/components/schemas/ReplayResult"
    AuditReplayJobDetailResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/AuditReplayJobDetail"
    LegalHold:
      type: object
      required:
        - legal_hold_id
        - hold_scope_type
        - reason_code
        - status
      properties:
        legal_hold_id:
          type: string
          format: uuid
        hold_scope_type:
          type: string
        hold_scope_id:
          type: string
          format: uuid
        reason_code:
          type: string
        status:
          type: string
          enum:
            - active
            - released
        retention_policy_id:
          type: string
          format: uuid
        requested_by:
          type: string
          format: uuid
        approved_by:
          type: string
          format: uuid
        hold_until:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        released_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
    AuditLegalHoldCreateRequest:
      type: object
      required:
        - hold_scope_type
        - hold_scope_id
        - reason_code
      properties:
        hold_scope_type:
          type: string
          description: one of `order`, `case`, or `dispute_case`
        hold_scope_id:
          type: string
          format: uuid
        reason_code:
          type: string
        retention_policy_id:
          type: string
          format: uuid
        hold_until:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
    AuditLegalHoldReleaseRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
        metadata:
          type: object
          additionalProperties: true
    AuditLegalHoldActionView:
      type: object
      required:
        - legal_hold
        - step_up_bound
      properties:
        legal_hold:
          $ref: "#/components/schemas/LegalHold"
        step_up_bound:
          type: boolean
    AuditLegalHoldActionResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/AuditLegalHoldActionView"
