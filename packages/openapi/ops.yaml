openapi: 3.1.0
info:
  title: Ops API
  version: v1
  description: |
    Ops / internal control-plane contract archive for the current implementation stage.
    Notification control-plane endpoints are frozen around the formal chain
    `notification.requested -> dtp.notification.dispatch -> notification-worker`.
    Frontend-facing console traffic must call `platform-core` facade routes
    `/api/v1/ops/notifications/*`; `notification-worker /internal/notifications/*`
    remains the internal execution contract and must not be used as a browser target.
paths:
  /health/live:
    get:
      summary: liveness probe
      tags: [OpsCore]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseString"
              example:
                success: true
                data: ok
  /health/ready:
    get:
      summary: readiness probe
      tags: [OpsCore]
      responses:
        "200":
          description: ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseString"
              example:
                success: true
                data: ready
  /health/deps:
    get:
      summary: dependency connectivity
      tags: [OpsCore]
      responses:
        "200":
          description: dependency checks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDependenciesReport"
  /internal/runtime:
    get:
      summary: runtime mode and build metadata
      tags: [OpsCore]
      responses:
        "200":
          description: runtime config
  /internal/dev/trace-links:
    get:
      summary: local observability and dependency links
      tags: [OpsCore]
      responses:
        "200":
          description: trace links
  /internal/dev/overview:
    get:
      summary: developer overview including mode and recent event snapshots
      tags: [OpsCore]
      responses:
        "200":
          description: developer overview
  /api/v1/developer/trace:
    get:
      summary: lookup tenant-scoped developer trace status by one primary key
      tags: [DeveloperOps]
      description: |
        Returns the formal V1 developer status lookup view for exactly one selector:
        `order_id`, `event_id`, or `tx_hash`. The response reads PostgreSQL-backed
        formal objects only: `trade.order_main`, `audit.audit_event`,
        `ops.outbox_event`, `ops.dead_letter_event`, `ops.external_fact_receipt`,
        `ops.chain_projection_gap`, `ops.trade_lifecycle_checkpoint`,
        `ops.trace_index`, `ops.system_log`, and `chain.chain_anchor`.
        The endpoint requires `developer.trace.read`; tenant-scoped callers must
        also provide `x-tenant-id` and stay within the resolved order scope.
        Go/Fabric services remain the write-back producers for proof / callback facts;
        this endpoint never treats Fabric itself as the synchronous truth source.
        Every lookup must append `audit.access_audit` and `ops.system_log`.
      parameters:
        - in: query
          name: order_id
          schema:
            type: string
            format: uuid
        - in: query
          name: event_id
          schema:
            type: string
            format: uuid
        - in: query
          name: tx_hash
          schema:
            type: string
      responses:
        "200":
          description: developer trace lookup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDeveloperTraceLookupResponse"
