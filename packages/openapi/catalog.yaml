openapi: 3.1.0
info:
  title: Catalog API
  version: v1
paths:
  /api/v1/products:
    post:
      summary: Create product draft
      operationId: createProductDraft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDataProductRequest"
      responses:
        "200":
          description: Product draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataProduct"
  /api/v1/products/{id}:
    patch:
      summary: Patch product draft
      operationId: patchProductDraft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchDataProductRequest"
      responses:
        "200":
          description: Product draft updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataProduct"
  /api/v1/products/{id}/skus:
    post:
      summary: Create SKU for draft product
      operationId: createProductSku
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductSkuRequest"
      responses:
        "200":
          description: SKU created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSku"
  /api/v1/skus/{id}:
    patch:
      summary: Patch draft SKU
      operationId: patchProductSku
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchProductSkuRequest"
      responses:
        "200":
          description: SKU updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSku"
  /api/v1/assets/{assetId}/raw-ingest-batches:
    post:
      summary: Create raw ingest batch
      operationId: createRawIngestBatch
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRawIngestBatchRequest"
      responses:
        "200":
          description: Raw ingest batch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawIngestBatch"
components:
  schemas:
    CreateDataProductRequest:
      type: object
      properties:
        asset_id:
          type: string
          format: uuid
        asset_version_id:
          type: string
          format: uuid
        seller_org_id:
          type: string
          format: uuid
        title:
          type: string
        category:
          type: string
        product_type:
          type: string
        description:
          type: string
          nullable: true
        price_mode:
          type: string
          nullable: true
        price:
          type: string
          nullable: true
        currency_code:
          type: string
          nullable: true
        delivery_type:
          type: string
        allowed_usage:
          type: array
          items:
            type: string
        searchable_text:
          type: string
          nullable: true
      required:
        - asset_id
        - asset_version_id
        - seller_org_id
        - title
        - category
        - product_type
        - delivery_type
    PatchDataProductRequest:
      type: object
      properties:
        title:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        product_type:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        price_mode:
          type: string
          nullable: true
        price:
          type: string
          nullable: true
        currency_code:
          type: string
          nullable: true
        delivery_type:
          type: string
          nullable: true
        searchable_text:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
    CreateProductSkuRequest:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
          nullable: true
        sku_code:
          type: string
        sku_type:
          type: string
        unit_name:
          type: string
          nullable: true
        billing_mode:
          type: string
        trade_mode:
          type: string
          nullable: true
        delivery_object_kind:
          type: string
          nullable: true
        subscription_cadence:
          type: string
          nullable: true
        share_protocol:
          type: string
          nullable: true
        result_form:
          type: string
          nullable: true
        template_id:
          type: string
          format: uuid
          nullable: true
        acceptance_mode:
          type: string
        refund_mode:
          type: string
      required:
        - sku_code
        - sku_type
        - billing_mode
        - acceptance_mode
        - refund_mode
    PatchProductSkuRequest:
      type: object
      properties:
        sku_code:
          type: string
          nullable: true
        sku_type:
          type: string
          nullable: true
        unit_name:
          type: string
          nullable: true
        billing_mode:
          type: string
          nullable: true
        trade_mode:
          type: string
          nullable: true
        delivery_object_kind:
          type: string
          nullable: true
        subscription_cadence:
          type: string
          nullable: true
        share_protocol:
          type: string
          nullable: true
        result_form:
          type: string
          nullable: true
        template_id:
          type: string
          format: uuid
          nullable: true
        acceptance_mode:
          type: string
          nullable: true
        refund_mode:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
    CreateRawIngestBatchRequest:
      type: object
      properties:
        asset_id:
          type: string
          format: uuid
          nullable: true
        owner_org_id:
          type: string
          format: uuid
        ingest_source_type:
          type: string
        declared_object_family:
          type: string
          nullable: true
        source_declared_rights_json:
          type: object
          additionalProperties: true
        ingest_policy_json:
          type: object
          additionalProperties: true
      required:
        - owner_org_id
        - ingest_source_type
    RawIngestBatch:
      type: object
      properties:
        raw_ingest_batch_id:
          type: string
          format: uuid
        owner_org_id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
          nullable: true
        ingest_source_type:
          type: string
        declared_object_family:
          type: string
          nullable: true
        source_declared_rights_json:
          type: object
          additionalProperties: true
        ingest_policy_json:
          type: object
          additionalProperties: true
        status:
          type: string
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - raw_ingest_batch_id
        - owner_org_id
        - ingest_source_type
        - source_declared_rights_json
        - ingest_policy_json
        - status
        - created_at
        - updated_at
    DataResource:
      type: object
      properties:
        asset_id:
          type: string
          format: uuid
        owner_org_id:
          type: string
          format: uuid
        title:
          type: string
        category:
          type: string
        sensitivity_level:
          type: string
        status:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - asset_id
        - owner_org_id
        - title
        - category
        - sensitivity_level
        - status
        - created_at
        - updated_at
    AssetVersion:
      type: object
      properties:
        asset_version_id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        version_no:
          type: integer
        schema_version:
          type: string
          nullable: true
        schema_hash:
          type: string
          nullable: true
        sample_hash:
          type: string
          nullable: true
        full_hash:
          type: string
          nullable: true
        data_size_bytes:
          type: integer
          nullable: true
        origin_region:
          type: string
          nullable: true
        allowed_region:
          type: array
          items:
            type: string
        requires_controlled_execution:
          type: boolean
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - asset_version_id
        - asset_id
        - version_no
        - allowed_region
        - requires_controlled_execution
        - status
        - created_at
        - updated_at
    DataProduct:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        asset_version_id:
          type: string
          format: uuid
        seller_org_id:
          type: string
          format: uuid
        title:
          type: string
        category:
          type: string
        product_type:
          type: string
        status:
          type: string
        price_mode:
          type: string
        price:
          type: string
        currency_code:
          type: string
        delivery_type:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - product_id
        - asset_id
        - asset_version_id
        - seller_org_id
        - title
        - category
        - product_type
        - status
        - price_mode
        - price
        - currency_code
        - delivery_type
        - created_at
        - updated_at
    ProductSku:
      type: object
      properties:
        sku_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        sku_code:
          type: string
        sku_type:
          type: string
        unit_name:
          type: string
          nullable: true
        billing_mode:
          type: string
        trade_mode:
          type: string
        acceptance_mode:
          type: string
        refund_mode:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - sku_id
        - product_id
        - sku_code
        - sku_type
        - billing_mode
        - trade_mode
        - acceptance_mode
        - refund_mode
        - status
        - created_at
        - updated_at
