        data_content_json:
          type: object
          additionalProperties: true
        structure_description_json:
          type: object
          additionalProperties: true
        quality_description_json:
          type: object
          additionalProperties: true
        compliance_description_json:
          type: object
          additionalProperties: true
        delivery_description_json:
          type: object
          additionalProperties: true
        version_description_json:
