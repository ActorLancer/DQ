openapi: 3.1.0
info:
  title: Catalog API
  version: v1
paths:
  /api/v1/products:
    post:
      summary: Create product draft
      operationId: createProductDraft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDataProductRequest"
      responses:
        "200":
          description: Product draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataProduct"
  /api/v1/products/{id}:
    patch:
      summary: Patch product draft
      operationId: patchProductDraft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchDataProductRequest"
      responses:
        "200":
          description: Product draft updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataProduct"
  /api/v1/products/{id}/metadata-profile:
    put:
      summary: Upsert metadata profile for product
      operationId: putProductMetadataProfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutProductMetadataProfileRequest"
      responses:
        "200":
          description: Product metadata profile upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductMetadataProfile"
  /api/v1/products/{id}/skus:
    post:
      summary: Create SKU for draft product
      operationId: createProductSku
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductSkuRequest"
      responses:
        "200":
          description: SKU created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSku"
  /api/v1/skus/{id}:
    patch:
      summary: Patch draft SKU
      operationId: patchProductSku
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchProductSkuRequest"
      responses:
        "200":
          description: SKU updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSku"
  /api/v1/skus/{id}/data-contracts:
    post:
      summary: Create data contract for SKU
      operationId: createDataContract
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDataContractRequest"
      responses:
        "200":
          description: Data contract created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataContract"
  /api/v1/skus/{id}/data-contracts/{contractId}:
    get:
      summary: Get data contract by id for SKU
      operationId: getDataContract
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contractId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Data contract detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataContract"
  /api/v1/assets/{assetId}/raw-ingest-batches:
    post:
      summary: Create raw ingest batch
      operationId: createRawIngestBatch
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRawIngestBatchRequest"
      responses:
        "200":
          description: Raw ingest batch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawIngestBatch"
  /api/v1/raw-ingest-batches/{id}/manifests:
    post:
      summary: Create raw object manifest
      operationId: createRawObjectManifest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRawObjectManifestRequest"
      responses:
        "200":
          description: Raw object manifest created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawObjectManifest"
  /api/v1/raw-object-manifests/{id}/detect-format:
    post:
      summary: Detect format for raw object manifest
      operationId: detectRawObjectFormat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFormatDetectionRequest"
      responses:
        "200":
          description: Format detection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormatDetectionResult"
  /api/v1/raw-object-manifests/{id}/extraction-jobs:
    post:
      summary: Create extraction job for raw object manifest
      operationId: createExtractionJob
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExtractionJobRequest"
      responses:
        "200":
          description: Extraction job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionJob"
  /api/v1/assets/{versionId}/preview-artifacts:
    post:
      summary: Create preview artifact for asset version
      operationId: createPreviewArtifact
      parameters:
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePreviewArtifactRequest"
      responses:
        "200":
          description: Preview artifact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewArtifact"
  /api/v1/assets/{versionId}/field-definitions:
    post:
      summary: Create field definition for asset version
      operationId: createAssetFieldDefinition
      parameters:
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetFieldDefinitionRequest"
      responses:
        "200":
          description: Asset field definition created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetFieldDefinition"
  /api/v1/assets/{versionId}/quality-reports:
    post:
      summary: Create quality report for asset version
      operationId: createAssetQualityReport
      parameters:
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetQualityReportRequest"
      responses:
        "200":
          description: Asset quality report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetQualityReport"
  /api/v1/assets/{versionId}/processing-jobs:
    post:
      summary: Create processing job for asset version
      operationId: createAssetProcessingJob
      parameters:
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetProcessingJobRequest"
      responses:
        "200":
          description: Asset processing job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetProcessingJob"
components:
