          type: string
          nullable: true
        price_mode:
          type: string
          nullable: true
        price:
          type: string
          nullable: true
        currency_code:
          type: string
          nullable: true
        delivery_type:
          type: string
        allowed_usage:
          type: array
          items:
            type: string
        searchable_text:
          type: string
          nullable: true
      required:
