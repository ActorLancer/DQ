openapi: 3.1.0
info:
  title: Trade API
  version: v1
  description: |
    V1 trade baseline currently includes:
    - TRADE-001 minimal pre-order request model for RFQ / sample / POC
    - TRADE-002 order price snapshot freeze model
    - TRADE-003 order creation with product state / risk / price snapshot validation
    - TRADE-030 payment-result transition mapping:
      - payment succeeded -> order status buyer_locked (delivery pending)
      - payment failed -> order status payment_failed_pending_resolution
      - payment timeout -> order status payment_timeout_pending_compensation_cancel
paths:
  /api/v1/orders:
    post:
      summary: Create an order from listed product and sku
      operationId: createOrder
      tags: [trade]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '200':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
  /api/v1/trade/pre-requests:
    post:
      summary: Create a trade pre-request (RFQ/sample/POC)
      operationId: createTradePreRequest
      tags: [trade]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTradePreRequestRequest'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradePreRequestResponse'
  /api/v1/trade/pre-requests/{id}:
    get:
      summary: Get a trade pre-request
      operationId: getTradePreRequest
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Query success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradePreRequestResponse'
  /api/v1/trade/orders/{id}/price-snapshot/freeze:
    post:
      summary: Freeze order price snapshot from catalog SKU metadata
      operationId: freezeOrderPriceSnapshot
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Snapshot frozen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreezeOrderPriceSnapshotResponse'
components:
  schemas:
    ContractExpectationSnapshot:
      type: object
      properties:
        contract_template_id:
          type: string
          format: uuid
        expected_term_days:
          type: integer
          minimum: 1
        expected_sla_tier:
          type: string
        custom_terms_note:
          type: string
    AuthorizationExpectationSnapshot:
      type: object
      properties:
        grant_scope:
          type: string
        access_mode:
          type: string
        expected_valid_days:
          type: integer
          minimum: 1
        export_allowed:
          type: boolean
        requires_poc_environment:
          type: boolean
    TradePreRequestDetails:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        expected_budget_range:
          type: string
        sample_field_scope:
          type: array
          items:
            type: string
        poc_goal:
          type: string
        expected_start_date:
          type: string
          format: date
    CreateTradePreRequestRequest:
      type: object
      required: [buyer_org_id, request_kind, details]
      properties:
        buyer_org_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        request_kind:
          type: string
          enum: [rfq, sample_request, poc_request]
        details:
          $ref: '#/components/schemas/TradePreRequestDetails'
        contract_expectation:
          $ref: '#/components/schemas/ContractExpectationSnapshot'
        authorization_expectation:
          $ref: '#/components/schemas/AuthorizationExpectationSnapshot'
    CreateOrderRequest:
      type: object
      required: [buyer_org_id, product_id, sku_id]
      properties:
        buyer_org_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        sku_id:
          type: string
          format: uuid
        inquiry_id:
          type: string
          format: uuid
    CreateOrderResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/CreateOrderResponseData'
    CreateOrderResponseData:
      type: object
      required:
        [
          order_id,
          buyer_org_id,
          seller_org_id,
          product_id,
          sku_id,
          status,
          payment_status,
          amount,
          currency_code,
          price_snapshot,
          created_at,
        ]
      properties:
        order_id:
          type: string
          format: uuid
        buyer_org_id:
          type: string
          format: uuid
        seller_org_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        sku_id:
          type: string
          format: uuid
        status:
          type: string
        payment_status:
          type: string
        amount:
          type: string
        currency_code:
          type: string
        price_snapshot:
          $ref: '#/components/schemas/OrderPriceSnapshot'
        created_at:
          type: string
          format: date-time
    TradePreRequestResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/TradePreRequestResponseData'
    TradePreRequestResponseData:
      type: object
      required:
        [
          inquiry_id,
          buyer_org_id,
          status,
          request_kind,
          details,
          contract_expectation,
          authorization_expectation,
          created_at,
          updated_at,
        ]
      properties:
        inquiry_id:
          type: string
          format: uuid
        buyer_org_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        status:
          type: string
          enum: [open, submitted, closed]
        request_kind:
          type: string
          enum: [rfq, sample_request, poc_request]
        details:
          $ref: '#/components/schemas/TradePreRequestDetails'
        contract_expectation:
          $ref: '#/components/schemas/ContractExpectationSnapshot'
        authorization_expectation:
          $ref: '#/components/schemas/AuthorizationExpectationSnapshot'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SettlementTermsSnapshot:
      type: object
      required: [settlement_basis, settlement_mode]
      properties:
        settlement_basis:
          type: string
        settlement_mode:
          type: string
    TaxTermsSnapshot:
      type: object
      required: [tax_policy, tax_code, tax_inclusive]
      properties:
        tax_policy:
          type: string
        tax_code:
          type: string
        tax_inclusive:
          type: boolean
    OrderPriceSnapshot:
      type: object
      required:
        [
          product_id,
          sku_id,
          sku_code,
          sku_type,
          pricing_mode,
          unit_price,
          currency_code,
          billing_mode,
          refund_mode,
          settlement_terms,
          tax_terms,
          captured_at,
          source,
        ]
      properties:
        product_id:
          type: string
          format: uuid
        sku_id:
          type: string
          format: uuid
        sku_code:
          type: string
        sku_type:
          type: string
        pricing_mode:
          type: string
        unit_price:
          type: string
        currency_code:
          type: string
        billing_mode:
          type: string
        refund_mode:
          type: string
        settlement_terms:
          $ref: '#/components/schemas/SettlementTermsSnapshot'
        tax_terms:
          $ref: '#/components/schemas/TaxTermsSnapshot'
        captured_at:
          type: string
        source:
          type: string
    FreezeOrderPriceSnapshotResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              type: object
              required: [order_id, snapshot]
              properties:
                order_id:
                  type: string
                  format: uuid
                snapshot:
                  $ref: '#/components/schemas/OrderPriceSnapshot'
    OrderPaymentOrchestrationTransition:
      type: object
      required: [payment_result, from_order_status, to_order_status, non_regression_guard]
      properties:
        payment_result:
          type: string
          enum: [succeeded, failed, timeout]
        from_order_status:
          type: string
        to_order_status:
          type: string
        non_regression_guard:
          type: string
