  /api/v1/orders/{id}/rpt-std/transition:
    post:
      summary: Transition RPT_STD order state under report delivery state-machine rules
      operationId: transitionRptStdOrder
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
