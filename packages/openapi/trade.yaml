components:
  schemas:
    GetOrderTemplatesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrderTemplateView'
    OrderTemplateView:
      type: object
      required:
        [
          template_code,
          scenario_code,
          scenario_name,
          industry_code,
          primary_sku,
          supplementary_skus,
          contract_template,
          acceptance_template,
          refund_template,
          workflow_steps,
          order_draft,
        ]
      properties:
        template_code:
          type: string
        scenario_code:
          type: string
        scenario_name:
          type: string
        industry_code:
          type: string
        primary_sku:
          type: string
        supplementary_skus:
          type: array
          items:
            type: string
        contract_template:
          type: string
        acceptance_template:
          type: string
        refund_template:
          type: string
        workflow_steps:
          type: array
          items:
            type: string
        order_draft:
          type: object
          additionalProperties: true
    ContractExpectationSnapshot:
      type: object
      properties:
        contract_template_id:
          type: string
          format: uuid
        expected_term_days:
          type: integer
          minimum: 1
        expected_sla_tier:
          type: string
        custom_terms_note:
          type: string
    AuthorizationExpectationSnapshot:
      type: object
      properties:
        grant_scope:
          type: string
        access_mode:
          type: string
        expected_valid_days:
          type: integer
          minimum: 1
        export_allowed:
          type: boolean
        requires_poc_environment:
          type: boolean
    TradePreRequestDetails:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        expected_budget_range:
          type: string
        sample_field_scope:
          type: array
          items:
            type: string
        poc_goal:
          type: string
        expected_start_date:
          type: string
          format: date
    CreateTradePreRequestRequest:
      type: object
      required: [buyer_org_id, request_kind, details]
      properties:
        buyer_org_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        request_kind:
          type: string
          enum: [rfq, sample_request, poc_request]
        details:
          $ref: '#/components/schemas/TradePreRequestDetails'
        contract_expectation:
          $ref: '#/components/schemas/ContractExpectationSnapshot'
        authorization_expectation:
          $ref: '#/components/schemas/AuthorizationExpectationSnapshot'
    CreateOrderRequest:
      type: object
      required: [buyer_org_id, product_id, sku_id]
      properties:
        buyer_org_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        sku_id:
          type: string
          format: uuid
        inquiry_id:
          type: string
          format: uuid
    CreateOrderResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/CreateOrderResponseData'
    CreateOrderResponseData:
      type: object
      required:
        [
          order_id,
          buyer_org_id,
          seller_org_id,
          product_id,
          sku_id,
          status,
          payment_status,
          amount,
          currency_code,
          price_snapshot,
          created_at,
        ]
      properties:
        order_id:
          type: string
          format: uuid
        buyer_org_id:
          type: string
          format: uuid
        seller_org_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        sku_id:
          type: string
          format: uuid
        status:
          type: string
        payment_status:
          type: string
        amount:
          type: string
        currency_code:
          type: string
        price_snapshot:
          $ref: '#/components/schemas/OrderPriceSnapshot'
        created_at:
          type: string
          format: date-time
    GetOrderDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/GetOrderDetailResponseData'
    GetOrderDetailResponseData:
      type: object
      required:
        [
          order_id,
          buyer_org_id,
          seller_org_id,
          product_id,
          sku_id,
          current_state,
          payment_status,
          delivery_status,
          acceptance_status,
          settlement_status,
          dispute_status,
          amount,
          currency_code,
          relations,
          created_at,
          updated_at,
        ]
      properties:
        order_id:
          type: string
          format: uuid
        buyer_org_id:
          type: string
          format: uuid
        seller_org_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        sku_id:
          type: string
          format: uuid
        current_state:
          type: string
        payment_status:
          type: string
        delivery_status:
          type: string
        acceptance_status:
          type: string
        settlement_status:
          type: string
        dispute_status:
          type: string
        amount:
          type: string
        currency_code:
          type: string
        price_snapshot:
          $ref: '#/components/schemas/OrderPriceSnapshot'
          nullable: true
        relations:
          $ref: '#/components/schemas/OrderRelations'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OrderRelations:
      type: object
      required: [authorizations, deliveries, billing, disputes]
      properties:
        contract:
          $ref: '#/components/schemas/OrderContractRelation'
          nullable: true
        authorizations:
          type: array
          items:
            $ref: '#/components/schemas/OrderAuthorizationRelation'
        deliveries:
          type: array
          items:
            $ref: '#/components/schemas/OrderDeliveryRelation'
        billing:
          $ref: '#/components/schemas/OrderBillingRelations'
        disputes:
          type: array
          items:
            $ref: '#/components/schemas/OrderDisputeRelation'
    OrderContractRelation:
      type: object
      required: [contract_id, contract_status, variables_json, updated_at]
      properties:
        contract_id:
          type: string
          format: uuid
        contract_template_id:
          type: string
          format: uuid
          nullable: true
        contract_status:
          type: string
        contract_digest:
          type: string
          nullable: true
        data_contract_id:
          type: string
          format: uuid
          nullable: true
        data_contract_digest:
          type: string
          nullable: true
        signed_at:
          type: string
          format: date-time
          nullable: true
        variables_json:
          type: object
          additionalProperties: true
        updated_at:
          type: string
          format: date-time
    OrderAuthorizationRelation:
      type: object
      required:
        [
          authorization_id,
          current_status,
          grant_type,
          granted_to_type,
          granted_to_id,
          valid_from,
          authorization_model,
          policy_snapshot,
          updated_at,
        ]
      properties:
        authorization_id:
          type: string
          format: uuid
        current_status:
          type: string
        grant_type:
          type: string
        granted_to_type:
          type: string
        granted_to_id:
          type: string
          format: uuid
        valid_from:
          type: string
          format: date-time
        valid_to:
          type: string
          format: date-time
          nullable: true
        authorization_model:
          $ref: '#/components/schemas/AuthorizationModelSnapshot'
        policy_snapshot:
          type: object
          additionalProperties: true
        updated_at:
          type: string
          format: date-time
    OrderDeliveryRelation:
      type: object
      required: [delivery_id, delivery_type, current_status, updated_at]
      properties:
        delivery_id:
          type: string
          format: uuid
        delivery_type:
          type: string
        delivery_route:
          type: string
          nullable: true
        current_status:
          type: string
        delivery_commit_hash:
          type: string
          nullable: true
        receipt_hash:
          type: string
          nullable: true
        committed_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
    OrderBillingRelations:
      type: object
      required: [billing_events, settlements, refunds, compensations, invoices]
      properties:
        billing_events:
          type: array
          items:
            $ref: '#/components/schemas/OrderBillingEventRelation'
        settlements:
          type: array
          items:
            $ref: '#/components/schemas/OrderSettlementRelation'
        refunds:
          type: array
          items:
            $ref: '#/components/schemas/OrderRefundRelation'
        compensations:
          type: array
          items:
            $ref: '#/components/schemas/OrderCompensationRelation'
        invoices:
          type: array
          items:
            $ref: '#/components/schemas/OrderInvoiceRelation'
    OrderBillingEventRelation:
      type: object
      required:
        [
          billing_event_id,
          event_type,
          event_source,
          amount,
          currency_code,
          occurred_at,
          metadata,
        ]
      properties:
        billing_event_id:
          type: string
          format: uuid
        event_type:
          type: string
        event_source:
          type: string
        amount:
          type: string
        currency_code:
          type: string
        units:
          type: string
          nullable: true
        occurred_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
    OrderSettlementRelation:
      type: object
      required:
        [
          settlement_id,
          settlement_type,
          settlement_status,
          settlement_mode,
          payable_amount,
          refund_amount,
          compensation_amount,
          updated_at,
        ]
      properties:
        settlement_id:
          type: string
          format: uuid
        settlement_type:
          type: string
        settlement_status:
          type: string
        settlement_mode:
          type: string
        payable_amount:
          type: string
        refund_amount:
          type: string
        compensation_amount:
          type: string
        reason_code:
          type: string
          nullable: true
        settled_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
    OrderRefundRelation:
      type: object
      required: [refund_id, amount, currency_code, current_status, updated_at]
      properties:
        refund_id:
          type: string
          format: uuid
        amount:
          type: string
        currency_code:
          type: string
        current_status:
          type: string
        executed_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
    OrderCompensationRelation:
      type: object
      required: [compensation_id, amount, currency_code, current_status, updated_at]
      properties:
        compensation_id:
          type: string
          format: uuid
        amount:
          type: string
        currency_code:
          type: string
        current_status:
          type: string
        executed_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
    OrderInvoiceRelation:
      type: object
      required:
        [
          invoice_request_id,
          requester_org_id,
          invoice_title,
          amount,
          currency_code,
          current_status,
          updated_at,
        ]
      properties:
        invoice_request_id:
          type: string
          format: uuid
        settlement_id:
          type: string
          format: uuid
          nullable: true
        requester_org_id:
          type: string
          format: uuid
        invoice_title:
          type: string
        amount:
          type: string
        currency_code:
          type: string
        current_status:
          type: string
        updated_at:
          type: string
          format: date-time
    OrderDisputeRelation:
      type: object
      required:
        [
          case_id,
          complainant_type,
          complainant_id,
          reason_code,
          current_status,
          evidence_count,
          opened_at,
          updated_at,
        ]
      properties:
        case_id:
          type: string
          format: uuid
        complainant_type:
          type: string
        complainant_id:
          type: string
          format: uuid
        reason_code:
          type: string
        current_status:
          type: string
        decision_code:
          type: string
          nullable: true
        penalty_code:
          type: string
          nullable: true
        evidence_count:
          type: integer
          format: int64
        opened_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
    GetOrderLifecycleSnapshotsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
