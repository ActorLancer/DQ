      responses:
        '200':
          description: API_SUB transition applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSubTransitionResponse'
  /api/v1/orders/{id}/api-ppu/transition:
    post:
      summary: Transition API_PPU order state under usage-based state-machine rules
      operationId: transitionApiPpuOrder
      tags: [trade]
      parameters:
        - in: path
