          application/json:
            schema:
              $ref: '#/components/schemas/ApiPpuTransitionRequest'
      responses:
        '200':
          description: API_PPU transition applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiPpuTransitionResponse'
  /api/v1/orders/{id}/share-ro/transition:
    post:
      summary: Transition SHARE_RO order state under read-only sharing state-machine rules
      description: The first opening action enable_share requires a buyer_locked order that passes the TRADE-031 deliverability gate and creates a prepared delivery record.
      operationId: transitionShareRoOrder
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareRoTransitionRequest'
      responses:
        '200':
          description: SHARE_RO transition applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareRoTransitionResponse'
  /api/v1/orders/{id}/qry-lite/transition:
    post:
      summary: Transition QRY_LITE order state under template-query state-machine rules
      description: The first opening action authorize_template requires a buyer_locked order that passes the TRADE-031 deliverability gate and creates a prepared delivery record.
      operationId: transitionQryLiteOrder
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QryLiteTransitionRequest'
      responses:
        '200':
          description: QRY_LITE transition applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QryLiteTransitionResponse'
  /api/v1/orders/{id}/sbx-std/transition:
    post:
      summary: Transition SBX_STD order state under sandbox state-machine rules
      description: The first opening action enable_workspace requires a buyer_locked order that passes the TRADE-031 deliverability gate and creates a prepared delivery record.
      operationId: transitionSbxStdOrder
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SbxStdTransitionRequest'
      responses:
        '200':
          description: SBX_STD transition applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SbxStdTransitionResponse'
  /api/v1/orders/{id}/rpt-std/transition:
    post:
      summary: Transition RPT_STD order state under report delivery state-machine rules
      description: The first opening action create_report_task requires a buyer_locked order that passes the TRADE-031 deliverability gate and creates a prepared delivery record.
      operationId: transitionRptStdOrder
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RptStdTransitionRequest'
      responses:
        '200':
          description: RPT_STD transition applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RptStdTransitionResponse'
  /api/v1/trade/pre-requests:
    post:
      summary: Create a trade pre-request (RFQ/sample/POC)
      operationId: createTradePreRequest
      tags: [trade]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTradePreRequestRequest'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradePreRequestResponse'
  /api/v1/trade/pre-requests/{id}:
    get:
      summary: Get a trade pre-request
      operationId: getTradePreRequest
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Query success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradePreRequestResponse'
  /api/v1/trade/orders/{id}/price-snapshot/freeze:
    post:
      summary: Freeze order price snapshot from catalog SKU metadata
      operationId: freezeOrderPriceSnapshot
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
