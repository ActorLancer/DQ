  /api/v1/trade/pre-requests:
    post:
      summary: Create a trade pre-request (RFQ/sample/POC)
      operationId: createTradePreRequest
      tags: [trade]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTradePreRequestRequest'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradePreRequestResponse'
  /api/v1/trade/pre-requests/{id}:
    get:
      summary: Get a trade pre-request
      operationId: getTradePreRequest
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Query success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradePreRequestResponse'
  /api/v1/trade/orders/{id}/price-snapshot/freeze:
    post:
      summary: Freeze order price snapshot from catalog SKU metadata
      operationId: freezeOrderPriceSnapshot
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Snapshot frozen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreezeOrderPriceSnapshotResponse'
components:
  schemas:
    ContractExpectationSnapshot:
      type: object
      properties:
        contract_template_id:
          type: string
          format: uuid
        expected_term_days:
          type: integer
          minimum: 1
        expected_sla_tier:
          type: string
        custom_terms_note:
          type: string
    AuthorizationExpectationSnapshot:
      type: object
      properties:
        grant_scope:
          type: string
        access_mode:
          type: string
        expected_valid_days:
          type: integer
          minimum: 1
        export_allowed:
          type: boolean
        requires_poc_environment:
          type: boolean
    TradePreRequestDetails:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        expected_budget_range:
          type: string
        sample_field_scope:
          type: array
          items:
            type: string
        poc_goal:
          type: string
        expected_start_date:
          type: string
          format: date
    CreateTradePreRequestRequest:
      type: object
      required: [buyer_org_id, request_kind, details]
      properties:
        buyer_org_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        request_kind:
          type: string
          enum: [rfq, sample_request, poc_request]
        details:
          $ref: '#/components/schemas/TradePreRequestDetails'
        contract_expectation:
          $ref: '#/components/schemas/ContractExpectationSnapshot'
        authorization_expectation:
          $ref: '#/components/schemas/AuthorizationExpectationSnapshot'
    CreateOrderRequest:
      type: object
      required: [buyer_org_id, product_id, sku_id]
      properties:
        buyer_org_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        sku_id:
          type: string
          format: uuid
        inquiry_id:
          type: string
          format: uuid
    CreateOrderResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/CreateOrderResponseData'
    CreateOrderResponseData:
      type: object
      required:
        [
          order_id,
          buyer_org_id,
          seller_org_id,
          product_id,
          sku_id,
          status,
          payment_status,
          amount,
          currency_code,
          price_snapshot,
          created_at,
        ]
      properties:
        order_id:
          type: string
          format: uuid
        buyer_org_id:
          type: string
          format: uuid
        seller_org_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        sku_id:
          type: string
          format: uuid
        status:
          type: string
        payment_status:
          type: string
        amount:
          type: string
        currency_code:
          type: string
        price_snapshot:
          $ref: '#/components/schemas/OrderPriceSnapshot'
        created_at:
          type: string
          format: date-time
    GetOrderDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/GetOrderDetailResponseData'
    GetOrderDetailResponseData:
      type: object
      required:
        [
          order_id,
          buyer_org_id,
          seller_org_id,
          product_id,
          sku_id,
          current_state,
          payment_status,
          delivery_status,
          acceptance_status,
          settlement_status,
          dispute_status,
          amount,
          currency_code,
          created_at,
          updated_at,
        ]
      properties:
        order_id:
          type: string
          format: uuid
        buyer_org_id:
          type: string
          format: uuid
        seller_org_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        sku_id:
          type: string
          format: uuid
        current_state:
          type: string
        payment_status:
          type: string
        delivery_status:
          type: string
        acceptance_status:
          type: string
        settlement_status:
          type: string
        dispute_status:
          type: string
        amount:
          type: string
        currency_code:
          type: string
        price_snapshot:
          $ref: '#/components/schemas/OrderPriceSnapshot'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CancelOrderResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/CancelOrderResponseData'
    CancelOrderResponseData:
      type: object
      required:
        [
          order_id,
          previous_state,
          current_state,
          payment_status,
          refund_branch,
          refund_required,
          reason_code,
          canceled_at,
        ]
      properties:
        order_id:
          type: string
          format: uuid
        previous_state:
          type: string
        current_state:
          type: string
          enum: [closed]
        payment_status:
          type: string
        refund_branch:
          type: string
          enum: [no_refund, refund_required]
        refund_required:
          type: boolean
        reason_code:
          type: string
        canceled_at:
          type: string
          format: date-time
    ConfirmOrderContractRequest:
      type: object
      required: [contract_template_id, contract_digest, signer_role]
      properties:
        contract_template_id:
          type: string
          format: uuid
        contract_digest:
          type: string
        data_contract_id:
          type: string
          format: uuid
          nullable: true
        data_contract_digest:
          type: string
          nullable: true
        variables_json:
          type: object
          additionalProperties: true
        signer_role:
          type: string
          enum: [buyer_signatory, buyer_operator, legal_reviewer]
    ConfirmOrderContractResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/ConfirmOrderContractResponseData'
    ConfirmOrderContractResponseData:
      type: object
      required:
        [
          order_id,
          contract_id,
          contract_template_id,
          contract_digest,
          contract_status,
          order_status,
          signer_id,
          signer_type,
          signer_role,
          signed_at,
          variables_json,
          onchain_digest_ref,
        ]
      properties:
        order_id:
          type: string
          format: uuid
        contract_id:
          type: string
          format: uuid
        contract_template_id:
          type: string
          format: uuid
        contract_digest:
          type: string
        data_contract_id:
          type: string
          format: uuid
          nullable: true
        data_contract_digest:
          type: string
          nullable: true
        contract_status:
          type: string
        order_status:
          type: string
        signer_id:
          type: string
          format: uuid
        signer_type:
          type: string
        signer_role:
          type: string
        signed_at:
          type: string
          format: date-time
        variables_json:
          type: object
          additionalProperties: true
        onchain_digest_ref:
          type: string
    FileStdTransitionRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum:
            [
              lock_funds,
              start_delivery,
              mark_delivered,
              accept_delivery,
              settle_order,
              close_completed,
              request_refund,
              open_dispute,
              resolve_dispute_refund,
              resolve_dispute_complete,
            ]
        reason_note:
          type: string
    FileSubTransitionRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum:
            [
              establish_subscription,
              start_cycle_delivery,
              mark_cycle_delivered,
              accept_cycle_delivery,
              pause_subscription,
              expire_subscription,
              renew_subscription,
              request_refund,
              open_dispute,
              resolve_dispute_refund,
              resolve_dispute_complete,
            ]
        reason_note:
          type: string
    ApiSubTransitionRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum:
            [
              lock_funds,
              bind_application,
              issue_api_key,
              trial_call,
              activate_subscription,
              bill_cycle,
              terminate_subscription,
            ]
        reason_note:
          type: string
    ApiPpuTransitionRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum:
            [
              authorize_access,
              configure_quota,
              settle_success_call,
              record_failed_call,
              expire_access,
              disable_access,
            ]
        reason_note:
          type: string
    ShareRoTransitionRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum:
            [
              enable_share,
              grant_read_access,
              confirm_first_query,
              revoke_share,
              expire_share,
              interrupt_dispute,
            ]
        reason_note:
          type: string
    QryLiteTransitionRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum:
            [
              authorize_template,
              validate_params,
              execute_query,
              make_result_available,
              close_acceptance,
            ]
        reason_note:
          type: string
    SbxStdTransitionRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum:
            [
              enable_workspace,
              issue_account_seat,
              execute_sandbox_query,
              export_limited_result,
              expire_sandbox,
              revoke_sandbox,
            ]
        reason_note:
          type: string
    RptStdTransitionRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum:
            [
              create_report_task,
              generate_report,
              deliver_report,
              accept_report,
              settle_report,
            ]
        reason_note:
          type: string
    OrderAuthorizationTransitionRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [grant, revoke, expire, suspend, recover]
        policy_id:
          type: string
          format: uuid
        grant_type:
          type: string
        granted_to_type:
          type: string
        granted_to_id:
          type: string
          format: uuid
        valid_to:
          type: string
          format: date-time
        reason_note:
          type: string
        policy_snapshot:
          type: object
          additionalProperties: true
    FileStdTransitionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/FileStdTransitionResponseData'
    FileSubTransitionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/FileSubTransitionResponseData'
    ApiSubTransitionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/ApiSubTransitionResponseData'
    ApiPpuTransitionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/ApiPpuTransitionResponseData'
    ShareRoTransitionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/ShareRoTransitionResponseData'
    QryLiteTransitionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/QryLiteTransitionResponseData'
    SbxStdTransitionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/SbxStdTransitionResponseData'
    RptStdTransitionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/RptStdTransitionResponseData'
    OrderAuthorizationTransitionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/OrderAuthorizationTransitionResponseData'
    FileStdTransitionResponseData:
      type: object
      required:
        [
          order_id,
          action,
          previous_state,
          current_state,
          payment_status,
          delivery_status,
          acceptance_status,
          settlement_status,
          dispute_status,
          reason_code,
          transitioned_at,
        ]
      properties:
        order_id:
          type: string
          format: uuid
        action:
          type: string
        previous_state:
          type: string
        current_state:
          type: string
        payment_status:
          type: string
        delivery_status:
          type: string
        acceptance_status:
          type: string
        settlement_status:
          type: string
        dispute_status:
          type: string
        reason_code:
          type: string
        transitioned_at:
          type: string
          format: date-time
    FileSubTransitionResponseData:
      type: object
      required:
        [
          order_id,
          action,
          previous_state,
          current_state,
          payment_status,
          delivery_status,
          acceptance_status,
          settlement_status,
