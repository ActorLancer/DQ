openapi: 3.1.0
info:
  title: Trade API
  version: v1
  description: |
    V1 trade baseline currently includes:
    - TRADE-001 minimal pre-order request model for RFQ / sample / POC
    - TRADE-002 order price snapshot freeze model
    - TRADE-003 order creation with product state / risk / price snapshot validation
    - TRADE-016 digital-contract aggregate (template/snapshot/signer/anchor ref)
    - TRADE-030 payment-result transition mapping:
      - eligible pre-payment order states: created / contract_effective
      - payment succeeded -> order status buyer_locked (delivery pending)
      - payment failed -> order status payment_failed_pending_resolution
      - payment timeout -> order status payment_timeout_pending_compensation_cancel
    - TRADE-031 deliverability gate:
      - first fulfillment/opening actions require buyer_locked + paid + signed contract
      - subject state / product review / risk must pass before fulfillment can begin
      - successful gate creates delivery.delivery_record with prepared status
paths:
  /api/v1/orders/standard-templates:
    get:
      summary: List frozen standard order templates for the first five trade scenarios
      operationId: listStandardOrderTemplates
      tags: [trade]
      responses:
        '200':
          description: Standard order templates found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOrderTemplatesResponse'
  /api/v1/orders:
    post:
      summary: Create an order from listed product and sku
      operationId: createOrder
      tags: [trade]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '200':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
  /api/v1/orders/{id}:
    get:
      summary: Get order detail with layered status fields
      operationId: getOrderDetail
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order detail found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOrderDetailResponse'
  /api/v1/orders/{id}/lifecycle-snapshots:
    get:
      summary: Get order lifecycle snapshots with structured sub-domain fields
      operationId: getOrderLifecycleSnapshots
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lifecycle snapshots found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOrderLifecycleSnapshotsResponse'
  /api/v1/orders/{id}/cancel:
    post:
      summary: Cancel order under state-machine constraints and refund branch
      operationId: cancelOrder
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelOrderResponse'
  /api/v1/orders/{id}/contract-confirm:
    post:
      summary: Confirm order contract with contract snapshot and signer role
      operationId: confirmOrderContract
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmOrderContractRequest'
      responses:
        '200':
          description: Contract confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmOrderContractResponse'
  /api/v1/orders/{id}/authorization/transition:
    post:
      summary: Transition order authorization aggregate state
      operationId: transitionOrderAuthorization
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderAuthorizationTransitionRequest'
      responses:
        '200':
          description: Authorization transition applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderAuthorizationTransitionResponse'
  /api/v1/orders/{id}/file-std/transition:
    post:
      summary: Transition FILE_STD order state under state-machine rules
      operationId: transitionFileStdOrder
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileStdTransitionRequest'
      responses:
        '200':
          description: FILE_STD transition applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileStdTransitionResponse'
  /api/v1/orders/{id}/file-sub/transition:
    post:
      summary: Transition FILE_SUB order state under subscription state-machine rules
      operationId: transitionFileSubOrder
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileSubTransitionRequest'
      responses:
        '200':
          description: FILE_SUB transition applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileSubTransitionResponse'
  /api/v1/orders/{id}/api-sub/transition:
    post:
      summary: Transition API_SUB order state under subscription state-machine rules
      operationId: transitionApiSubOrder
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiSubTransitionRequest'
      responses:
        '200':
          description: API_SUB transition applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSubTransitionResponse'
  /api/v1/orders/{id}/api-ppu/transition:
    post:
      summary: Transition API_PPU order state under usage-based state-machine rules
      description: The first opening action authorize_access requires a buyer_locked order that passes the TRADE-031 deliverability gate and creates a prepared delivery record.
      operationId: transitionApiPpuOrder
      tags: [trade]
      parameters:
        - in: path
          name: id
          required: true
