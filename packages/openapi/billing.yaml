openapi: 3.1.0
info:
  title: Billing API
  version: v1
paths:
  /api/v1/payment-jurisdictions:
    get:
      summary: List payment jurisdiction profiles
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
          description: platform_admin | platform_finance_operator | platform_risk_settlement | tenant_admin
      responses:
        "200":
          description: Jurisdiction profiles loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JurisdictionProfileListResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create or update payment jurisdiction profile
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-step-up-token
          required: false
          schema:
            type: string
        - in: header
          name: x-step-up-challenge-id
          required: false
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJurisdictionProfileRequest"
      responses:
        "200":
          description: Jurisdiction profile saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JurisdictionProfileResponse"
        "400":
          description: Invalid payload or missing step-up placeholder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payment-corridors:
    get:
      summary: List payment corridor policies
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Corridor policies loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorridorPolicyListResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create or update payment corridor policy
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-step-up-token
          required: false
          schema:
            type: string
        - in: header
          name: x-step-up-challenge-id
          required: false
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCorridorPolicyRequest"
      responses:
        "200":
          description: Corridor policy saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorridorPolicyResponse"
        "400":
          description: Invalid payload or missing step-up placeholder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payout-preferences:
    get:
      summary: List payout preferences
      tags: [Billing]
      parameters:
        - in: query
          name: beneficiary_subject_type
          required: false
          schema:
            type: string
        - in: query
          name: beneficiary_subject_id
          required: false
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-tenant-id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Payout preferences loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutPreferenceListResponse"
        "400":
          description: Invalid scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Set default payout preference
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-tenant-id
          required: false
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePayoutPreferenceRequest"
      responses:
        "200":
          description: Payout preference created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutPreferenceResponse"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden or tenant scope mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payments/intents:
    post:
      summary: Create payment intent
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
        - in: header
          name: x-step-up-token
          required: false
          schema:
            type: string
        - in: header
          name: x-step-up-challenge-id
          required: false
          schema:
            type: string
        - in: header
          name: x-idempotency-key
          required: true
          schema:
            type: string
          description: Required idempotency key. Payment intent create is a high-risk action and must also carry step-up evidence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentIntentRequest"
      responses:
        "200":
          description: Payment intent created or idempotency replayed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentResponse"
        "400":
          description: Invalid request payload or persistence failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payments/intents/{id}:
    get:
      summary: Query payment intent
      tags: [Billing]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment intent loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentDetailResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payments/intents/{id}/cancel:
    post:
      summary: Cancel payment intent
      tags: [Billing]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment intent canceled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Illegal status transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/orders/{id}/lock:
    post:
      summary: Lock order payment and link payment intent
      tags: [Billing]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-tenant-id
          required: false
          schema:
            type: string
          description: Buyer tenant scope for tenant-side payment lock.
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LockOrderRequest"
      responses:
        "200":
          description: Order lock completed or idempotency replayed for the same payment intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderLockResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment intent or order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Payment intent and order mismatch, price snapshot mismatch, or illegal lock state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payments/webhooks/{provider}:
    post:
      summary: Receive payment webhook callback
      description: Provider callback entrypoint with signature placeholder, idempotency, replay protection, and out-of-order guard.
      tags: [Billing]
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
        - in: header
          name: x-provider-signature
          required: false
          schema:
            type: string
        - in: header
          name: x-webhook-timestamp
          required: false
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
        - in: header
          name: x-trace-id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentWebhookRequest"
      responses:
        "200":
          description: Webhook accepted and processed (or safely ignored)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentWebhookResultResponse"
        "400":
          description: Invalid payload or persistence failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
          nullable: true
    ApiEnvelopeJurisdictionList:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/JurisdictionProfile"
    ApiEnvelopeJurisdiction:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/JurisdictionProfile"
    ApiEnvelopeCorridorList:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/CorridorPolicy"
    ApiEnvelopeCorridor:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/CorridorPolicy"
    ApiEnvelopePayoutPreferenceList:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/PayoutPreference"
    ApiEnvelopePayoutPreference:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PayoutPreference"
    ApiEnvelopePaymentIntent:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PaymentIntent"
    ApiEnvelopePaymentIntentDetail:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PaymentIntentDetail"
    ApiEnvelopeOrderLock:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/OrderLock"
    ApiEnvelopePaymentWebhookResult:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PaymentWebhookResult"
    JurisdictionProfile:
      type: object
      required:
        [
          jurisdiction_code,
          jurisdiction_name,
          launch_phase,
          supports_fiat_collection,
          supports_fiat_payout,
          supports_crypto_settlement,
          jurisdiction_status,
          policy_snapshot,
        ]
      properties:
        jurisdiction_code:
          type: string
        jurisdiction_name:
          type: string
        regulator_name:
          type: string
          nullable: true
        launch_phase:
          type: string
        supports_fiat_collection:
          type: boolean
        supports_fiat_payout:
          type: boolean
        supports_crypto_settlement:
          type: boolean
        jurisdiction_status:
          type: string
        policy_snapshot:
          type: object
          additionalProperties: true
    CorridorPolicy:
      type: object
      required:
        [
          corridor_policy_id,
          policy_name,
          payer_jurisdiction_code,
          payee_jurisdiction_code,
          product_scope,
          price_currency_code,
          allowed_collection_currencies,
          allowed_payout_currencies,
          route_mode,
          requires_manual_review,
          allows_crypto,
          corridor_status,
          policy_snapshot,
        ]
      properties:
        corridor_policy_id:
          type: string
        policy_name:
          type: string
        payer_jurisdiction_code:
          type: string
        payee_jurisdiction_code:
          type: string
        product_scope:
          type: string
        price_currency_code:
          type: string
        allowed_collection_currencies:
          type: array
          items:
            type: string
        allowed_payout_currencies:
          type: array
          items:
            type: string
        route_mode:
          type: string
        requires_manual_review:
          type: boolean
        allows_crypto:
          type: boolean
        corridor_status:
          type: string
        effective_from:
          type: string
          nullable: true
        effective_to:
          type: string
          nullable: true
        policy_snapshot:
          type: object
          additionalProperties: true
    PayoutPreference:
      type: object
      required:
        [
          payout_preference_id,
          beneficiary_subject_type,
          beneficiary_subject_id,
          destination_jurisdiction_code,
          preferred_currency_code,
          payout_method,
          preferred_provider_key,
          beneficiary_snapshot,
          is_default,
          preference_status,
        ]
      properties:
        payout_preference_id:
          type: string
        beneficiary_subject_type:
          type: string
        beneficiary_subject_id:
          type: string
        destination_jurisdiction_code:
          type: string
        preferred_currency_code:
          type: string
        payout_method:
          type: string
        preferred_provider_key:
          type: string
        preferred_provider_account_id:
          type: string
          nullable: true
        beneficiary_snapshot:
          type: object
          additionalProperties: true
        is_default:
          type: boolean
        preference_status:
          type: string
    CreateJurisdictionProfileRequest:
      type: object
      required:
        [
          jurisdiction_code,
          jurisdiction_name,
          launch_phase,
          supports_fiat_collection,
          supports_fiat_payout,
          supports_crypto_settlement,
          jurisdiction_status,
        ]
      properties:
        jurisdiction_code:
          type: string
        jurisdiction_name:
          type: string
        regulator_name:
          type: string
          nullable: true
        launch_phase:
          type: string
        supports_fiat_collection:
          type: boolean
        supports_fiat_payout:
          type: boolean
        supports_crypto_settlement:
          type: boolean
        jurisdiction_status:
          type: string
        policy_snapshot:
          type: object
          additionalProperties: true
    CreateCorridorPolicyRequest:
      type: object
      required:
        [
          policy_name,
          payer_jurisdiction_code,
          payee_jurisdiction_code,
          product_scope,
          price_currency_code,
          allowed_collection_currencies,
          allowed_payout_currencies,
          route_mode,
          requires_manual_review,
          allows_crypto,
          corridor_status,
        ]
      properties:
        policy_name:
          type: string
        payer_jurisdiction_code:
          type: string
        payee_jurisdiction_code:
          type: string
        product_scope:
          type: string
        price_currency_code:
          type: string
        allowed_collection_currencies:
          type: array
          items:
            type: string
        allowed_payout_currencies:
          type: array
          items:
            type: string
        route_mode:
          type: string
        requires_manual_review:
          type: boolean
        allows_crypto:
          type: boolean
        corridor_status:
          type: string
        effective_from:
          type: string
          nullable: true
        effective_to:
          type: string
          nullable: true
        policy_snapshot:
          type: object
          additionalProperties: true
    CreatePayoutPreferenceRequest:
      type: object
      required:
        [
          beneficiary_subject_type,
          beneficiary_subject_id,
          destination_jurisdiction_code,
          preferred_currency_code,
          payout_method,
          preferred_provider_key,
        ]
      properties:
        beneficiary_subject_type:
          type: string
        beneficiary_subject_id:
          type: string
        destination_jurisdiction_code:
          type: string
        preferred_currency_code:
          type: string
        payout_method:
          type: string
        preferred_provider_key:
          type: string
        preferred_provider_account_id:
          type: string
          nullable: true
        beneficiary_snapshot:
          type: object
          additionalProperties: true
    CreatePaymentIntentRequest:
      type: object
      required:
        [
          order_id,
          intent_type,
          provider_key,
          payer_subject_type,
          payer_subject_id,
          payment_amount,
          payment_method,
        ]
      properties:
        order_id:
          type: string
        intent_type:
          type: string
        provider_key:
          type: string
        provider_account_id:
          type: string
          nullable: true
        payer_subject_type:
          type: string
        payer_subject_id:
          type: string
        payee_subject_type:
          type: string
          nullable: true
        payee_subject_id:
          type: string
          nullable: true
        payer_jurisdiction_code:
          type: string
          nullable: true
        payee_jurisdiction_code:
          type: string
          nullable: true
        launch_jurisdiction_code:
          type: string
          nullable: true
        corridor_policy_id:
          type: string
          nullable: true
        fee_preview_id:
          type: string
          nullable: true
        payment_amount:
          type: string
        payment_method:
          type: string
        currency_code:
          type: string
          nullable: true
        price_currency_code:
          type: string
          nullable: true
        expire_at:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
    PaymentIntent:
      type: object
      required:
        [
          payment_intent_id,
          order_id,
          intent_type,
          provider_key,
          launch_jurisdiction_code,
          payer_subject_type,
          payer_subject_id,
          payment_amount,
          payment_method,
          currency_code,
          price_currency_code,
          payment_status,
          capability_snapshot,
          metadata,
          created_at,
          updated_at,
        ]
      properties:
        payment_intent_id:
          type: string
        order_id:
          type: string
        intent_type:
          type: string
        provider_key:
          type: string
        provider_account_id:
          type: string
          nullable: true
        payer_subject_type:
          type: string
        payer_subject_id:
          type: string
        payee_subject_type:
          type: string
          nullable: true
        payee_subject_id:
          type: string
          nullable: true
        payer_jurisdiction_code:
          type: string
          nullable: true
        payee_jurisdiction_code:
          type: string
          nullable: true
        launch_jurisdiction_code:
          type: string
        corridor_policy_id:
          type: string
          nullable: true
        fee_preview_id:
          type: string
          nullable: true
        payment_amount:
          type: string
        payment_method:
          type: string
        currency_code:
          type: string
        price_currency_code:
          type: string
        payment_status:
          type: string
        provider_intent_no:
          type: string
          nullable: true
        channel_reference_no:
          type: string
          nullable: true
        idempotency_key:
          type: string
          nullable: true
        request_id:
          type: string
          nullable: true
        expire_at:
          type: string
          nullable: true
        capability_snapshot:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
        updated_at:
          type: string
    PaymentTransactionSummary:
      type: object
      required:
        [
          payment_transaction_id,
          transaction_type,
          transaction_amount,
          currency_code,
          occurred_at,
        ]
      properties:
        payment_transaction_id:
          type: string
        transaction_type:
          type: string
        provider_transaction_no:
          type: string
          nullable: true
        provider_status:
          type: string
          nullable: true
        transaction_amount:
          type: string
        currency_code:
          type: string
        occurred_at:
          type: string
    PaymentWebhookSummary:
      type: object
      required:
        [
          webhook_event_id,
          provider_event_id,
          event_type,
          processed_status,
          duplicate_flag,
          signature_verified,
          received_at,
        ]
      properties:
        webhook_event_id:
          type: string
        provider_event_id:
          type: string
        event_type:
          type: string
        processed_status:
          type: string
        duplicate_flag:
          type: boolean
        signature_verified:
          type: boolean
        received_at:
          type: string
        processed_at:
          type: string
          nullable: true
    PaymentIntentDetail:
      type: object
      required: [payment_intent]
      properties:
        payment_intent:
          $ref: "#/components/schemas/PaymentIntent"
        latest_transaction_summary:
          allOf:
            - $ref: "#/components/schemas/PaymentTransactionSummary"
          nullable: true
        webhook_summary:
          allOf:
            - $ref: "#/components/schemas/PaymentWebhookSummary"
          nullable: true
    LockOrderRequest:
      type: object
      required: [payment_intent_id]
      properties:
        payment_intent_id:
          type: string
        lock_reason:
          type: string
          nullable: true
    OrderLock:
      type: object
      required:
        [order_id, payment_intent_id, order_status, payment_status, buyer_locked_at]
      properties:
        order_id:
          type: string
        payment_intent_id:
          type: string
        order_status:
          type: string
        payment_status:
          type: string
        buyer_locked_at:
          type: string
    PaymentWebhookRequest:
      type: object
      required: [provider_event_id, event_type]
      properties:
        provider_event_id:
          type: string
        event_type:
          type: string
        payment_intent_id:
          type: string
          nullable: true
