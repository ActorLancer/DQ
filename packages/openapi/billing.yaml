openapi: 3.1.0
info:
  title: Billing API
  version: v1
paths:
  /api/v1/billing/policies:
    get:
      summary: Read billing policy baseline
      description: Return jurisdiction and corridor placeholder baseline for V1 launch.
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
          description: platform_admin | platform_finance_operator | tenant_admin
      responses:
        "200":
          description: Policy baseline loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPolicyResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/billing/payout-preferences/{beneficiary_subject_id}:
    get:
      summary: Read payout preference placeholders
      tags: [Billing]
      parameters:
        - in: path
          name: beneficiary_subject_id
          required: true
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payout preferences loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutPreferenceListResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payments/intents:
    post:
      summary: Create payment intent
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
        - in: header
          name: x-idempotency-key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentIntentRequest"
      responses:
        "200":
          description: Payment intent created or idempotency replayed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentResponse"
        "400":
          description: Invalid request payload or persistence failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payments/intents/{id}:
    get:
      summary: Query payment intent
      tags: [Billing]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment intent loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payments/intents/{id}/cancel:
    post:
      summary: Cancel payment intent
      tags: [Billing]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment intent canceled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Illegal status transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/orders/{id}/lock:
    post:
      summary: Lock order payment and link payment intent
      tags: [Billing]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LockOrderRequest"
      responses:
        "200":
          description: Order lock completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderLockResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment intent or order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Payment intent and order mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payments/webhooks/{provider}:
    post:
      summary: Receive payment webhook callback
      description: Provider callback entrypoint with signature placeholder, idempotency, replay protection, and out-of-order guard.
      tags: [Billing]
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
        - in: header
          name: x-provider-signature
          required: false
          schema:
            type: string
        - in: header
          name: x-webhook-timestamp
          required: false
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
        - in: header
          name: x-trace-id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentWebhookRequest"
      responses:
        "200":
          description: Webhook accepted and processed (or safely ignored)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentWebhookResultResponse"
        "400":
          description: Invalid payload or persistence failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
          nullable: true
    ApiEnvelopeBillingPolicy:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/BillingPolicyView"
    ApiEnvelopePayoutPreferenceList:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/PayoutPreference"
    ApiEnvelopePaymentIntent:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PaymentIntent"
    ApiEnvelopeOrderLock:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/OrderLock"
    ApiEnvelopePaymentWebhookResult:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PaymentWebhookResult"
    BillingPolicyView:
      type: object
      required: [jurisdictions, corridor_policies]
      properties:
        jurisdictions:
          type: array
          items:
            $ref: "#/components/schemas/JurisdictionProfile"
        corridor_policies:
          type: array
          items:
            $ref: "#/components/schemas/CorridorPolicy"
    JurisdictionProfile:
      type: object
      required:
        [
          jurisdiction_code,
          jurisdiction_name,
          regulator_name,
          launch_phase,
          supports_fiat_collection,
          supports_fiat_payout,
          supports_crypto_settlement,
          jurisdiction_status,
        ]
      properties:
        jurisdiction_code:
          type: string
        jurisdiction_name:
          type: string
        regulator_name:
          type: string
        launch_phase:
          type: string
        supports_fiat_collection:
          type: boolean
        supports_fiat_payout:
          type: boolean
        supports_crypto_settlement:
          type: boolean
        jurisdiction_status:
          type: string
    CorridorPolicy:
      type: object
      required:
        [
          corridor_policy_id,
          policy_name,
          payer_jurisdiction_code,
          payee_jurisdiction_code,
          price_currency_code,
          allowed_collection_currencies,
          allowed_payout_currencies,
          route_mode,
          requires_manual_review,
          allows_crypto,
          corridor_status,
        ]
      properties:
        corridor_policy_id:
          type: string
        policy_name:
          type: string
        payer_jurisdiction_code:
          type: string
        payee_jurisdiction_code:
          type: string
        price_currency_code:
          type: string
        allowed_collection_currencies:
          type: array
          items:
            type: string
        allowed_payout_currencies:
          type: array
          items:
            type: string
        route_mode:
          type: string
        requires_manual_review:
          type: boolean
        allows_crypto:
          type: boolean
        corridor_status:
          type: string
    PayoutPreference:
      type: object
      required:
        [
          payout_preference_id,
          beneficiary_subject_type,
          beneficiary_subject_id,
          destination_jurisdiction_code,
          preferred_currency_code,
          payout_method,
          preferred_provider_key,
          preferred_provider_account_id,
          is_default,
          preference_status,
        ]
      properties:
        payout_preference_id:
          type: string
        beneficiary_subject_type:
          type: string
        beneficiary_subject_id:
          type: string
        destination_jurisdiction_code:
          type: string
        preferred_currency_code:
          type: string
        payout_method:
          type: string
        preferred_provider_key:
          type: string
        preferred_provider_account_id:
          type: string
        is_default:
          type: boolean
        preference_status:
          type: string
    CreatePaymentIntentRequest:
      type: object
      required:
        [
          order_id,
          provider_key,
          payer_subject_type,
          payer_subject_id,
          amount,
          payment_method,
        ]
      properties:
        order_id:
          type: string
        provider_key:
          type: string
        payer_subject_type:
          type: string
        payer_subject_id:
          type: string
        payee_subject_type:
          type: string
          nullable: true
        payee_subject_id:
          type: string
          nullable: true
        amount:
          type: string
        payment_method:
          type: string
        currency_code:
          type: string
          nullable: true
        price_currency_code:
          type: string
          nullable: true
        intent_type:
          type: string
          nullable: true
        payer_jurisdiction_code:
          type: string
          nullable: true
        payee_jurisdiction_code:
          type: string
          nullable: true
    PaymentIntent:
      type: object
      required:
        [
          payment_intent_id,
          order_id,
          intent_type,
          provider_key,
          payer_subject_type,
          payer_subject_id,
          amount,
          payment_method,
          currency_code,
          price_currency_code,
          status,
          created_at,
          updated_at,
        ]
      properties:
        payment_intent_id:
          type: string
        order_id:
          type: string
        intent_type:
          type: string
        provider_key:
          type: string
        payer_subject_type:
          type: string
        payer_subject_id:
          type: string
        payee_subject_type:
          type: string
          nullable: true
        payee_subject_id:
          type: string
          nullable: true
        amount:
          type: string
        payment_method:
          type: string
        currency_code:
          type: string
        price_currency_code:
          type: string
        status:
          type: string
        idempotency_key:
          type: string
          nullable: true
        request_id:
          type: string
          nullable: true
        created_at:
          type: string
        updated_at:
          type: string
    LockOrderRequest:
      type: object
      required: [payment_intent_id]
      properties:
        payment_intent_id:
          type: string
        lock_reason:
          type: string
          nullable: true
    OrderLock:
      type: object
      required:
        [
          order_id,
          payment_intent_id,
          order_status,
          payment_status,
          buyer_locked_at,
        ]
      properties:
        order_id:
          type: string
        payment_intent_id:
          type: string
        order_status:
          type: string
        payment_status:
          type: string
        buyer_locked_at:
          type: string
    PaymentWebhookRequest:
      type: object
      required: [provider_event_id, event_type]
      properties:
        provider_event_id:
          type: string
        event_type:
          type: string
        payment_intent_id:
          type: string
          nullable: true
        provider_status:
          type: string
          nullable: true
        occurred_at_ms:
          type: integer
          format: int64
          nullable: true
        payload:
          type: object
          additionalProperties: true
    PaymentWebhookResult:
      type: object
      required:
        [
          webhook_event_id,
          provider_key,
          provider_event_id,
          processed_status,
          duplicate,
          signature_verified,
          out_of_order_ignored,
        ]
      properties:
        webhook_event_id:
          type: string
        provider_key:
          type: string
        provider_event_id:
          type: string
        processed_status:
          type: string
        duplicate:
          type: boolean
        signature_verified:
          type: boolean
        out_of_order_ignored:
          type: boolean
        payment_intent_id:
          type: string
          nullable: true
        applied_payment_status:
          type: string
          nullable: true
    BillingPolicyResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBillingPolicy"
    PayoutPreferenceListResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopePayoutPreferenceList"
    PaymentIntentResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopePaymentIntent"
    OrderLockResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeOrderLock"
    PaymentWebhookResultResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopePaymentWebhookResult"
