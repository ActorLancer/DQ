# Redis local baseline config for V1-Core
bind 0.0.0.0
port 6379
protected-mode no
timeout 0
tcp-keepalive 300
databases 16

# Persistence
appendonly yes
appendfsync everysec
save 60 1000

# Memory & eviction
maxmemory 256mb
maxmemory-policy volatile-ttl

# Slowlog
slowlog-log-slower-than 10000
slowlog-max-len 512
