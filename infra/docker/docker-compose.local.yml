name: datab-local

x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  networks:
    - datab-local
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  postgres:
    <<: *service-defaults
    image: postgres:16-alpine
    container_name: datab-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-datab}
      POSTGRES_USER: ${POSTGRES_USER:-datab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datab_local_pass}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/initdb:/docker-entrypoint-initdb.d:ro
      - ../postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ../postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    container_name: datab-redis
    command:
      - sh
      - -c
      - redis-server /usr/local/etc/redis/redis.conf --requirepass "$${REDIS_PASSWORD}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-datab_redis_pass}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  kafka:
    <<: *service-defaults
    image: apache/kafka:3.9.1
    container_name: datab-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9094}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/9092'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio:
    <<: *service-defaults
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: datab-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-datab}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-datab_local_pass}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  opensearch:
    <<: *service-defaults
    image: opensearchproject/opensearch:2.18.0
    container_name: datab-opensearch
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-Admin123!Admin123!}
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms1g -Xmx1g}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${OPENSEARCH_HTTP_PORT:-9200}:9200"
      - "${OPENSEARCH_PERF_PORT:-9600}:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  keycloak:
    <<: *service-defaults
    image: quay.io/keycloak/keycloak:26.3
    container_name: datab-keycloak
    depends_on:
      postgres:
        condition: service_healthy
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: ${POSTGRES_DB:-datab}
      KC_DB_USERNAME: ${POSTGRES_USER:-datab}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-datab_local_pass}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123456}
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ../keycloak/realm-export:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  prometheus:
    <<: *service-defaults
    profiles: ["observability"]
    image: prom/prometheus:v3.5.0
    container_name: datab-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-7d}"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    <<: *service-defaults
    profiles: ["observability"]
    image: grafana/grafana:12.2.0
    container_name: datab-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123456}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  loki:
    <<: *service-defaults
    profiles: ["observability"]
    image: grafana/loki:3.5.5
    container_name: datab-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro

  tempo:
    <<: *service-defaults
    profiles: ["observability"]
    image: grafana/tempo:2.8.2
    container_name: datab-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "${TEMPO_PORT:-3200}:3200"
      - "${OTLP_GRPC_PORT:-4317}:4317"
      - "${OTLP_HTTP_PORT:-4318}:4318"
    volumes:
      - ./monitoring/tempo.yml:/etc/tempo/tempo.yml:ro

  mock-payment-provider:
    <<: *service-defaults
    profiles: ["mocks"]
    image: wiremock/wiremock:3.13.1
    container_name: datab-mock-payment-provider
    command:
      - --verbose
      - --global-response-templating
    environment:
      WIREMOCK_OPTIONS: --verbose --global-response-templating
    ports:
      - "${MOCK_PAYMENT_PORT:-8089}:8080"
    volumes:
      - ../mock-payment/mappings:/home/wiremock/mappings:ro
      - ../mock-payment/__files:/home/wiremock/__files:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/__admin >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  datab-local:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  opensearch_data:
  grafana_data:
