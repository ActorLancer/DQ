global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: platform-core
    static_configs:
      - targets: ["host.docker.internal:8094"]

  - job_name: notification-worker
    static_configs:
      - targets: ["host.docker.internal:8097"]

  - job_name: outbox-publisher
    static_configs:
      - targets: ["host.docker.internal:8098"]

  - job_name: mock-payment-provider
    metrics_path: /metrics
    static_configs:
      - targets: ["mock-payment-provider:8080"]

  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: minio-exporter
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]

  - job_name: opensearch-exporter
    static_configs:
      - targets: ["opensearch-exporter:9114"]

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:8889"]
