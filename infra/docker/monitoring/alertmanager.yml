global:
  resolve_timeout: 5m

route:
  receiver: local-webhook
  group_by: ["alertname", "job", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: local-webhook
    webhook_configs:
      - url: http://host.docker.internal:18080/alerts
        send_resolved: true
