services:
  # ENV-043 app-layer compose placeholder.
  # This file is intentionally example-only for future containerized integration.
  # Default V1 local flow remains: infra/docker/docker-compose.local.yml + host-run apps.

  platform-core:
    profiles: ["apps"]
    image: alpine:3.20
    container_name: datab-platform-core
    command: ["sh", "-c", "touch /tmp/healthy && tail -f /dev/null"]
    environment:
      APP_MODE: local
      APP_PROVIDER_MODE: mock
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-datab}:${POSTGRES_PASSWORD:-datab_local_pass}@postgres:5432/${POSTGRES_DB:-datab}
      REDIS_URL: redis://:${REDIS_PASSWORD:-datab_redis_pass}@redis:6379/0
      KAFKA_BROKERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      OPENSEARCH_ENDPOINT: http://opensearch:9200
      KEYCLOAK_BASE_URL: http://keycloak:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "${PLATFORM_CORE_PORT:-8080}:8080"
    networks:
      - datab-local
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  outbox-publisher:
    profiles: ["apps"]
    image: rust:1.85-bookworm
    container_name: datab-outbox-publisher
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command:
      [
        "sh",
        "-c",
        "cargo run -p outbox-publisher"
      ]
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8098
      DATABASE_URL: postgres://${POSTGRES_USER:-datab}:${POSTGRES_PASSWORD:-datab_local_pass}@postgres:5432/${POSTGRES_DB:-datab}
      KAFKA_BROKERS: kafka:9092
      TOPIC_DEAD_LETTER_EVENTS: ${TOPIC_DEAD_LETTER_EVENTS:-dtp.dead-letter}
      OUTBOX_PUBLISHER_WORKER_ID: datab-outbox-publisher
      OUTBOX_PUBLISHER_BATCH_SIZE: ${OUTBOX_PUBLISHER_BATCH_SIZE:-20}
      OUTBOX_PUBLISHER_POLL_INTERVAL_MS: ${OUTBOX_PUBLISHER_POLL_INTERVAL_MS:-500}
      OUTBOX_PUBLISHER_TIMEOUT_MS: ${OUTBOX_PUBLISHER_TIMEOUT_MS:-3000}
      OUTBOX_PUBLISHER_RETRY_BACKOFF_MS: ${OUTBOX_PUBLISHER_RETRY_BACKOFF_MS:-500}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - datab-local
    ports:
      - "${OUTBOX_PUBLISHER_PORT:-8098}:8098"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8098/health/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  fabric-adapter:
    profiles: ["apps"]
    image: alpine:3.20
    container_name: datab-fabric-adapter
    command: ["sh", "-c", "touch /tmp/healthy && tail -f /dev/null"]
    environment:
      FABRIC_REQUEST_TOPIC: dtp.fabric.requests
      FABRIC_CALLBACK_TOPIC: dtp.fabric.callbacks
      FABRIC_ADAPTER_CONSUMER_GROUP: ${FABRIC_ADAPTER_CONSUMER_GROUP:-cg-fabric-adapter}
      FABRIC_ADAPTER_CONSUMER_LOCK_TTL: ${FABRIC_ADAPTER_CONSUMER_LOCK_TTL:-15s}
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://:${REDIS_PASSWORD:-datab_redis_pass}@redis:6379/4
      REDIS_NAMESPACE: ${REDIS_NAMESPACE:-datab:v1}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - datab-local
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  notification-worker:
    profiles: ["apps"]
    image: rust:1.85-bookworm
    container_name: datab-notification-worker
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command:
      [
        "sh",
        "-c",
        "cargo run -p notification-worker"
      ]
    environment:
      APP_MODE: local
      PROVIDER_MODE: mock
      APP_HOST: 0.0.0.0
      APP_PORT: 8097
      DATABASE_URL: postgres://${POSTGRES_USER:-datab}:${POSTGRES_PASSWORD:-datab_local_pass}@postgres:5432/${POSTGRES_DB:-datab}
      REDIS_URL: redis://:${REDIS_PASSWORD:-datab_redis_pass}@redis:6379/2
      REDIS_NAMESPACE: ${REDIS_NAMESPACE:-datab:v1}
      NOTIFICATION_TOPIC: dtp.notification.dispatch
      NOTIFICATION_WORKER_CONSUMER_GROUP: ${NOTIFICATION_WORKER_CONSUMER_GROUP:-cg-notification-worker}
      NOTIFICATION_TEMPLATE_DIR: /workspace/apps/notification-worker/templates
      NOTIFICATION_RETRY_POLL_INTERVAL_MS: ${NOTIFICATION_RETRY_POLL_INTERVAL_MS:-500}
      NOTIFICATION_RETRY_BACKOFF_MS: ${NOTIFICATION_RETRY_BACKOFF_MS:-250}
      NOTIFICATION_RETRY_MAX_ATTEMPTS: ${NOTIFICATION_RETRY_MAX_ATTEMPTS:-3}
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - datab-local
    ports:
      - "${NOTIFICATION_WORKER_PORT:-8097}:8097"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8097/health/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  search-indexer:
    profiles: ["apps"]
    image: alpine:3.20
    container_name: datab-search-indexer
    command: ["sh", "-c", "touch /tmp/healthy && tail -f /dev/null"]
    environment:
      SEARCH_SYNC_TOPIC: dtp.search.sync
      SEARCH_INDEXER_CONSUMER_GROUP: ${SEARCH_INDEXER_CONSUMER_GROUP:-cg-search-indexer}
      KAFKA_BROKERS: kafka:9092
      OPENSEARCH_ENDPOINT: http://opensearch:9200
      INDEX_ALIAS_PRODUCT_SEARCH_READ: ${INDEX_ALIAS_PRODUCT_SEARCH_READ:-product_search_read}
      INDEX_ALIAS_PRODUCT_SEARCH_WRITE: ${INDEX_ALIAS_PRODUCT_SEARCH_WRITE:-product_search_write}
      INDEX_ALIAS_SELLER_SEARCH_READ: ${INDEX_ALIAS_SELLER_SEARCH_READ:-seller_search_read}
      INDEX_ALIAS_SELLER_SEARCH_WRITE: ${INDEX_ALIAS_SELLER_SEARCH_WRITE:-seller_search_write}
      INDEX_NAME_SEARCH_SYNC_JOBS: ${INDEX_NAME_SEARCH_SYNC_JOBS:-search_sync_jobs_v1}
    depends_on:
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - datab-local
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  recommendation-aggregator:
    profiles: ["apps"]
    image: alpine:3.20
    container_name: datab-recommendation-aggregator
    command: ["sh", "-c", "touch /tmp/healthy && tail -f /dev/null"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-datab}:${POSTGRES_PASSWORD:-datab_local_pass}@postgres:5432/${POSTGRES_DB:-datab}
      TOPIC_RECOMMENDATION_BEHAVIOR: dtp.recommend.behavior
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://:${REDIS_PASSWORD:-datab_redis_pass}@redis:6379/1
      REDIS_NAMESPACE: ${REDIS_NAMESPACE:-datab:v1}
      RECOMMENDATION_AGGREGATOR_CONSUMER_GROUP: ${RECOMMENDATION_AGGREGATOR_CONSUMER_GROUP:-cg-recommendation-aggregator}
      INDEX_ALIAS_PRODUCT_SEARCH_WRITE: ${INDEX_ALIAS_PRODUCT_SEARCH_WRITE:-product_search_write}
      INDEX_ALIAS_SELLER_SEARCH_WRITE: ${INDEX_ALIAS_SELLER_SEARCH_WRITE:-seller_search_write}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - datab-local
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
