services:
  # ENV-043 app-layer compose placeholder.
  # This file is intentionally example-only for future containerized integration.
  # Default V1 local flow remains: infra/docker/docker-compose.local.yml + host-run apps.

  platform-core:
    profiles: ["apps"]
    image: alpine:3.20
    container_name: datab-platform-core
    command: ["sh", "-c", "touch /tmp/healthy && tail -f /dev/null"]
    environment:
      APP_MODE: local
      APP_PROVIDER_MODE: mock
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-datab}:${POSTGRES_PASSWORD:-datab_local_pass}@postgres:5432/${POSTGRES_DB:-datab}
      REDIS_URL: redis://:${REDIS_PASSWORD:-datab_redis_pass}@redis:6379/0
      KAFKA_BROKERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      OPENSEARCH_ENDPOINT: http://opensearch:9200
      KEYCLOAK_BASE_URL: http://keycloak:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "${PLATFORM_CORE_PORT:-8080}:8080"
    networks:
      - datab-local
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  outbox-publisher:
    profiles: ["apps"]
    image: alpine:3.20
    container_name: datab-outbox-publisher
    command: ["sh", "-c", "touch /tmp/healthy && tail -f /dev/null"]
    environment:
      OUTBOX_DB_URL: postgres://${POSTGRES_USER:-datab}:${POSTGRES_PASSWORD:-datab_local_pass}@postgres:5432/${POSTGRES_DB:-datab}
      OUTBOX_KAFKA_BROKERS: kafka:9092
      OUTBOX_TOPIC: dtp.outbox.domain-events
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - datab-local
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  fabric-adapter:
    profiles: ["apps"]
    image: alpine:3.20
    container_name: datab-fabric-adapter
    command: ["sh", "-c", "touch /tmp/healthy && tail -f /dev/null"]
    environment:
      FABRIC_REQUEST_TOPIC: dtp.fabric.requests
      FABRIC_CALLBACK_TOPIC: dtp.fabric.callbacks
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - datab-local
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  notification-service:
    profiles: ["apps"]
    image: alpine:3.20
    container_name: datab-notification-service
    command: ["sh", "-c", "touch /tmp/healthy && tail -f /dev/null"]
    environment:
      NOTIFICATION_TOPIC: dtp.notification.dispatch
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - datab-local
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  search-indexer:
    profiles: ["apps"]
    image: alpine:3.20
    container_name: datab-search-indexer
    command: ["sh", "-c", "touch /tmp/healthy && tail -f /dev/null"]
    environment:
      SEARCH_SYNC_TOPIC: dtp.search.sync
      KAFKA_BROKERS: kafka:9092
      OPENSEARCH_ENDPOINT: http://opensearch:9200
      INDEX_ALIAS_CATALOG_PRODUCTS: ${INDEX_ALIAS_CATALOG_PRODUCTS:-catalog_products_v1}
      INDEX_ALIAS_SELLER_PROFILES: ${INDEX_ALIAS_SELLER_PROFILES:-seller_profiles_v1}
      INDEX_ALIAS_SEARCH_SYNC_JOBS: ${INDEX_ALIAS_SEARCH_SYNC_JOBS:-search_sync_jobs_v1}
    depends_on:
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - datab-local
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
