name: rollback-recovery

on:
  push:
  pull_request:

jobs:
  test-020-rollback-recovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install checker deps
        run: sudo apt-get update && sudo apt-get install -y jq postgresql-client ripgrep
      - name: Run TEST-020 rollback recovery
        run: ENV_FILE=infra/docker/.env.local bash ./scripts/check-rollback-recovery.sh
      - name: Collect rollback recovery artifacts
        if: always()
        run: |
          mkdir -p target/test-artifacts/rollback-recovery
          docker compose --env-file infra/docker/.env.local -f infra/docker/docker-compose.local.yml ps -a > target/test-artifacts/rollback-recovery/docker-compose-ps.txt || true
          docker compose --env-file infra/docker/.env.local -f infra/docker/docker-compose.local.yml logs --no-color > target/test-artifacts/rollback-recovery/docker-compose.log || true
      - name: Upload rollback recovery artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rollback-recovery-artifacts
          path: target/test-artifacts/rollback-recovery
          if-no-files-found: warn
      - name: Tear down local stack
        if: always()
        run: COMPOSE_ENV_FILE=infra/docker/.env.local bash ./scripts/down-local.sh || true
