name: contract-tests

on:
  push:
  pull_request:

jobs:
  test-003-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install checker deps
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run TEST-003 API contract baseline
        run: bash ./scripts/check-api-contract-baseline.sh
