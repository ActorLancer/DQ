name: provider-switch

on:
  push:
  pull_request:

jobs:
  provider-switch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/fabric-adapter/go.mod

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq postgresql-client ripgrep

      - name: Run TEST-007 provider switch checker
        run: ENV_FILE=infra/docker/.env.local ./scripts/check-provider-switch.sh

      - name: Tear down local stack
        if: always()
        run: ./scripts/down-local.sh || true

      - name: Tear down fabric local network
        if: always()
        run: make fabric-down || true
