name: search-rec-pg-authority

on:
  push:
  pull_request:

jobs:
  search-rec-pg-authority:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq postgresql-client ripgrep

      - name: Run TEST-010 search / recommendation PG authority checker
        run: ENV_FILE=infra/docker/.env.local ./scripts/check-searchrec-pg-authority.sh

      - name: Tear down local stack
        if: always()
        run: ./scripts/down-local.sh || true
