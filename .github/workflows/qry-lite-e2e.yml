name: qry-lite-e2e

on:
  push:
  pull_request:

jobs:
  test-026-qry-lite-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq postgresql-client ripgrep chromium

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TEST-026 QRY_LITE E2E
        run: ENV_FILE=infra/docker/.env.local bash ./scripts/check-qry-lite-e2e.sh

      - name: Collect TEST-026 artifacts
        if: always()
        run: |
          mkdir -p target/test-artifacts/qry-lite-e2e
          docker compose --env-file infra/docker/.env.local -f infra/docker/docker-compose.local.yml ps -a > target/test-artifacts/qry-lite-e2e/docker-compose-ps.txt || true
          docker compose --env-file infra/docker/.env.local -f infra/docker/docker-compose.local.yml logs --no-color > target/test-artifacts/qry-lite-e2e/docker-compose.log || true

      - name: Upload TEST-026 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qry-lite-e2e-artifacts
          path: target/test-artifacts/qry-lite-e2e
          if-no-files-found: warn

      - name: Tear down local stack
        if: always()
        run: COMPOSE_ENV_FILE=infra/docker/.env.local bash ./scripts/down-local.sh || true
