name: datab-staging-example

# ENV-034:
# This file is a staging reference only.
# Do not place real production secrets or cloud endpoints here.

x-k8s-note: &k8s-note
  restart: unless-stopped
  init: true
  # Mapping hint: each service maps to one Kubernetes Deployment/StatefulSet.

services:
  platform-core:
    <<: *k8s-note
    image: ghcr.io/example/platform-core:staging-latest
    environment:
      RUST_LOG: info
      HTTP_PORT: 8080
      DATABASE_URL: postgresql://datab:REPLACE_ME@postgres:5432/datab
      REDIS_URL: redis://:REPLACE_ME@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_BASE_URL: http://keycloak:8080
      MINIO_ENDPOINT: http://minio:9000
      OPENSEARCH_ENDPOINT: http://opensearch:9200
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - kafka
      - minio
      - opensearch
      - keycloak
      - otel-collector
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10

  postgres:
    <<: *k8s-note
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: datab
      POSTGRES_USER: datab
      POSTGRES_PASSWORD: REPLACE_ME
    ports:
      - "5432:5432"
    # K8s mapping: StatefulSet + PVC

  redis:
    <<: *k8s-note
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "REPLACE_ME"]
    ports:
      - "6379:6379"
    # K8s mapping: StatefulSet + PVC

  kafka:
    <<: *k8s-note
    image: apache/kafka:3.9.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    ports:
      - "9092:9092"
    # K8s mapping: StatefulSet + PVC

  minio:
    <<: *k8s-note
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: datab
      MINIO_ROOT_PASSWORD: REPLACE_ME
    ports:
      - "9000:9000"
      - "9001:9001"
    # K8s mapping: Deployment/StatefulSet + PVC + Ingress

  opensearch:
    <<: *k8s-note
    image: opensearchproject/opensearch:2.18.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    # K8s mapping: StatefulSet + PVC

  keycloak:
    <<: *k8s-note
    image: quay.io/keycloak/keycloak:26.3
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: datab
      KC_DB_USERNAME: datab
      KC_DB_PASSWORD: REPLACE_ME
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: REPLACE_ME
    ports:
      - "8081:8080"
    # K8s mapping: Deployment + Secret + ConfigMap

  fabric-adapter:
    <<: *k8s-note
    image: ghcr.io/example/fabric-adapter:staging-latest
    environment:
      FABRIC_NETWORK: REPLACE_ME
      FABRIC_CHANNEL: datab-channel
    # K8s mapping: Deployment

  otel-collector:
    <<: *k8s-note
    image: otel/opentelemetry-collector-contrib:0.107.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    # K8s mapping: Deployment + ConfigMap

  prometheus:
    <<: *k8s-note
    image: prom/prometheus:v3.5.0
    ports:
      - "9090:9090"
    # K8s mapping: Deployment + ConfigMap + PVC

  grafana:
    <<: *k8s-note
    image: grafana/grafana:12.2.0
    ports:
      - "3000:3000"
    # K8s mapping: Deployment + ConfigMap + PVC + Ingress

  loki:
    <<: *k8s-note
    image: grafana/loki:3.5.5
    ports:
      - "3100:3100"
    # K8s mapping: StatefulSet + PVC

  tempo:
    <<: *k8s-note
    image: grafana/tempo:2.8.2
    ports:
      - "3200:3200"
    # K8s mapping: StatefulSet + PVC

  mock-payment-provider:
    <<: *k8s-note
    image: wiremock/wiremock:3.13.1
    ports:
      - "8089:8080"
    # K8s mapping: Deployment (non-prod only)
