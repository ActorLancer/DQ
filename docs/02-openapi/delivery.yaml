openapi: 3.1.0
info:
  title: DataB Delivery API
  version: 1.0.0
  description: >-
    Delivery module baseline for V1. DLV-001 freezes storage-gateway shared
    schemas; DLV-002 adds the file-delivery commit endpoint; DLV-003 adds
    short-lived download-ticket issuance backed by Redis cache; DLV-004 adds
    ticket-validated file download with delivery-receipt logging; DLV-005 adds
    FILE_SUB revision-subscription manage/read APIs; DLV-006 adds SHARE_RO
    share-grant manage/read APIs; DLV-007 adds API delivery enablement; DLV-008
    adds API usage-log read APIs; DLV-009 adds QuerySurface management for
    product-scoped query execution configuration; DLV-010 adds QueryTemplate
    version management for a controlled query surface; DLV-011 adds
    template-grant enablement for QRY_LITE orders with whitelisted templates,
    output boundaries, and quota snapshots; DLV-012 adds template query
    execution with QueryExecutionRun persistence, MinIO result artifacts, and
    risk/output-boundary enforcement; DLV-013 adds query-run history read APIs
    with audit references and policy-hit summaries; DLV-014 adds sandbox
    workspace enablement for SBX_STD orders with workspace/session
    provisioning, expiry, and export-policy snapshots; DLV-019 freezes a
    placeholder watermark/fingerprint policy on file/report delivery objects so
    future watermark pipelines can attach without changing the read contract;
    DLV-020 adds standardized delivery receipt outbox events for
    file/api/share/template/sandbox/report branches; DLV-024 adds order-scoped
    execution attestation read and destruction-attestation recording APIs for
    sensitive delivery evidence.
servers:
  - url: http://127.0.0.1:8080
paths:
  /api/v1/orders/{id}/deliver:
    post:
      summary: Commit file/report delivery or enable API access for a deliverable order
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitOrderDeliveryRequest'
      responses:
        '200':
          description: File/report delivery committed or API access enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitOrderDeliveryResponseEnvelope'
        '400':
          description: Invalid payload or delivery persistence conflict
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order not found
        '409':
          description: Order state does not allow the requested delivery branch
  /api/v1/orders/{id}/accept:
    post:
      summary: Accept a manually delivered FILE_STD/FILE_SUB/RPT_STD order
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptOrderRequest'
      responses:
        '200':
          description: Order acceptance persisted and the latest delivery record marked accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptOrderResponseEnvelope'
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order not found
        '409':
          description: SKU or current order state does not allow manual acceptance
  /api/v1/orders/{id}/reject:
    post:
      summary: Reject a manually delivered FILE_STD/FILE_SUB/RPT_STD order
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectOrderRequest'
      responses:
        '200':
          description: Order rejection persisted and the latest delivery record marked rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RejectOrderResponseEnvelope'
        '400':
          description: reject payload is incomplete
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order not found
        '409':
          description: SKU or current order state does not allow rejection
  /api/v1/orders/{id}/download-ticket:
    get:
      summary: Issue a short-lived download ticket for a committed file delivery
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Download ticket issued and cached in Redis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadTicketResponseEnvelope'
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order not found
        '409':
          description: Ticket expired, exhausted, or current order state does not allow issuance
        '500':
          description: Redis cache write failed
  /api/v1/orders/{id}/download:
    get:
      summary: Download a committed file delivery through the ticket-validated gateway
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: ticket
          in: query
          required: true
          schema:
            type: string
          description: Short-lived download token returned by the download-ticket API
      responses:
        '200':
          description: File payload fetched from MinIO and download receipt persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadFileResponseEnvelope'
        '403':
          description: Permission or tenant-scope forbidden
        '409':
          description: Ticket invalid, expired, exhausted, or current order state does not allow download
        '502':
          description: MinIO or object-store fetch failed
  /api/v1/orders/{id}/subscriptions:
    post:
      summary: Create or renew a FILE_SUB revision subscription
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManageRevisionSubscriptionRequest'
      responses:
        '200':
          description: Revision subscription created, updated, or renewed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageRevisionSubscriptionResponseEnvelope'
        '400':
          description: Invalid cadence or delivery_channel
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order not found
        '409':
          description: SKU is not FILE_SUB, order not paid, or revision range is invalid
    get:
      summary: Read FILE_SUB revision subscription status
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Revision subscription visible under order scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRevisionSubscriptionResponseEnvelope'
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order or revision subscription not found
  /api/v1/orders/{id}/share-grants:
    post:
      summary: Create, update, or revoke a SHARE_RO grant
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManageShareGrantRequest'
      responses:
        '200':
          description: SHARE_RO grant created, updated, regranted, or revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageShareGrantResponseEnvelope'
        '400':
          description: Invalid payload or timestamp format
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order or active grant not found
        '409':
          description: SKU is not SHARE_RO, share object is invalid, or current state does not allow management
    get:
      summary: Read SHARE_RO grant history under order scope
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SHARE_RO grant records visible under order scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetShareGrantResponseEnvelope'
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order or share grant not found
  /api/v1/orders/{id}/template-grants:
    post:
      summary: Create or update a QRY_LITE template-query grant with whitelisted templates
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManageTemplateGrantRequest'
      responses:
        '200':
          description: Template-query grant created or updated for the order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageTemplateGrantResponseEnvelope'
        '400':
          description: Invalid JSON shape or required grant fields are missing
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order or query surface not found
        '409':
          description: SKU is not QRY_LITE, selected templates are invalid, or output boundary/quota exceeds the frozen surface policy
  /api/v1/orders/{id}/sandbox-workspaces:
    post:
      summary: Provision or refresh a sandbox workspace for an SBX_STD order
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManageSandboxWorkspaceRequest'
      responses:
        '200':
          description: Sandbox workspace and seat session provisioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageSandboxWorkspaceResponseEnvelope'
        '400':
          description: Invalid query surface, seat user, or expire_at payload
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order or query surface not found
        '409':
          description: SKU is not SBX_STD, query surface/environment mismatch, or export policy exceeds the sandbox boundary
  /api/v1/orders/{id}/sensitive-execution-policies:
    post:
      summary: Create or update a sensitive execution policy snapshot under order scope
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManageSensitiveExecutionPolicyRequest'
      responses:
        '200':
          description: Sensitive execution policy snapshot created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageSensitiveExecutionPolicyResponseEnvelope'
        '400':
          description: Invalid JSON shape for output boundary or export control
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order, query surface, template grant, or sandbox workspace not found
        '409':
          description: Order payment/path is illegal, or policy scope/execution mode conflicts with the frozen delivery path
  /api/v1/orders/{id}/template-runs:
    get:
      summary: Read QRY_LITE query-run history under order scope
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Query-run timeline, result summaries, and audit references visible under buyer scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetQueryRunsResponseEnvelope'
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order not found
        '409':
          description: Order is not QRY_LITE or buyer/seller subject status blocks query-run history access
    post:
      summary: Execute a granted QRY_LITE template run and persist QueryExecutionRun plus result artifact
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteTemplateRunRequest'
      responses:
        '200':
          description: Template query executed and QueryExecutionRun persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteTemplateRunResponseEnvelope'
        '400':
          description: Invalid parameter payload or JSON shape
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order, template grant, template, or requester not found
        '409':
          description: Grant inactive, parameters invalid, output boundary exceeded, risk guard blocked, or quota exhausted
  /api/v1/query-runs/{id}/disclosure-review:
    post:
      summary: Create or update a result disclosure review placeholder under query-run scope
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewResultDisclosureRequest'
      responses:
        '200':
          description: Result disclosure review created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResultDisclosureResponseEnvelope'
        '400':
          description: Invalid JSON shape for decision snapshot
        '403':
          description: Platform reviewer scope required
        '404':
          description: Query run not found
        '409':
          description: Query run status, output boundary, reviewer, or approval ticket violates the frozen placeholder contract
  /api/v1/orders/{id}/attestations:
    get:
      summary: Read execution attestation records visible under an order scope
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Execution attestation records returned for the order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOrderAttestationsResponseEnvelope'
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order not found
        '409':
          description: No execution attestation exists for the current order
  /api/v1/orders/{id}/destruction-attestations:
    post:
      summary: Create or update a destruction or retention attestation after revocation, expiry, dispute, or legal hold
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManageDestructionAttestationRequest'
      responses:
        '200':
          description: Destruction or retention attestation persisted for the order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageDestructionAttestationResponseEnvelope'
        '400':
          description: Invalid payload structure or enum value
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Order not found
        '409':
          description: Order has not reached expiry or revocation stage, object not linked, or approval proof is incomplete
  /api/v1/orders/{id}/usage-log:
    get:
      summary: Read minimal-disclosure API usage logs under order scope
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: API usage-log summary and entries visible to the buyer-side app owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiUsageLogResponseEnvelope'
        '403':
          description: Permission or buyer-app ownership scope forbidden
        '404':
          description: Order not found
        '409':
          description: Order is not an API SKU or API delivery has not been enabled
  /api/v1/products/{id}/query-surfaces:
    post:
      summary: Create or update a product-scoped QuerySurface definition
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManageQuerySurfaceRequest'
      responses:
        '200':
          description: QuerySurface created or updated for the product asset version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageQuerySurfaceResponseEnvelope'
        '400':
          description: Invalid enum or JSON payload shape
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: Product not found
        '409':
          description: Asset version, environment, read scope, or output boundary is invalid
  /api/v1/query-surfaces/{id}/templates:
    post:
      summary: Create or update a QueryTemplate version for a QuerySurface
      tags: [delivery]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManageQueryTemplateRequest'
      responses:
        '200':
          description: QueryTemplate version created or updated for the QuerySurface
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageQueryTemplateResponseEnvelope'
        '400':
          description: Invalid schema, status, or version payload
        '403':
          description: Permission or tenant-scope forbidden
        '404':
          description: QuerySurface not found
        '409':
          description: QuerySurface scope, whitelist field, analysis rule, or export policy is invalid
components:
  schemas:
    ManageQuerySurfaceRequest:
      type: object
      properties:
        query_surface_id:
          type: string
          format: uuid
          nullable: true
        asset_object_id:
          type: string
          format: uuid
          nullable: true
        environment_id:
          type: string
          format: uuid
          nullable: true
        surface_type:
          type: string
          enum: [template_query_lite, sandbox_query, report_result]
          nullable: true
        binding_mode:
          type: string
          enum: [managed_surface, seller_managed]
          nullable: true
        execution_scope:
          type: string
          enum: [curated_zone, product_zone, result_zone]
          nullable: true
        input_contract_json:
          type: object
          additionalProperties: true
          nullable: true
        output_boundary_json:
          type: object
          additionalProperties: true
          nullable: true
        query_policy_json:
          type: object
          additionalProperties: true
          nullable: true
        quota_policy_json:
          type: object
          additionalProperties: true
          nullable: true
        status:
          type: string
          enum: [draft, active, disabled]
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
    ManageQuerySurfaceResponseEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/ManageQuerySurfaceResponse'
    ManageQuerySurfaceResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/QuerySurfaceResponseData'
    QuerySurfaceResponseData:
      type: object
      required:
        - query_surface_id
        - product_id
        - asset_version_id
        - environment_id
        - surface_type
        - binding_mode
        - execution_scope
        - input_contract_json
        - output_boundary_json
        - query_policy_json
        - quota_policy_json
        - status
        - operation
        - created_at
        - updated_at
      properties:
        query_surface_id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        asset_version_id:
          type: string
          format: uuid
        asset_object_id:
          type: string
          format: uuid
          nullable: true
        environment_id:
          type: string
          format: uuid
        surface_type:
          type: string
        binding_mode:
          type: string
        execution_scope:
          type: string
        input_contract_json:
          type: object
          additionalProperties: true
        output_boundary_json:
          type: object
          additionalProperties: true
        query_policy_json:
          type: object
          additionalProperties: true
        quota_policy_json:
          type: object
          additionalProperties: true
        status:
          type: string
        operation:
          type: string
          enum: [created, updated]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ManageQueryTemplateRequest:
      type: object
      properties:
        query_template_id:
          type: string
          format: uuid
          nullable: true
        template_name:
          type: string
          nullable: true
        template_type:
          type: string
          nullable: true
        template_body_ref:
          type: string
          nullable: true
        version_no:
          type: integer
          format: int32
          nullable: true
        parameter_schema_json:
          type: object
          additionalProperties: true
          nullable: true
        analysis_rule_json:
          type: object
          additionalProperties: true
          nullable: true
        result_schema_json:
          type: object
          additionalProperties: true
          nullable: true
        export_policy_json:
          type: object
          additionalProperties: true
          nullable: true
        risk_guard_json:
          type: object
          additionalProperties: true
          nullable: true
        whitelist_fields:
          type: array
          nullable: true
          items:
            type: string
        status:
          type: string
          enum: [draft, active, disabled]
          nullable: true
    ManageQueryTemplateResponseEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/ManageQueryTemplateResponse'
    ManageQueryTemplateResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/QueryTemplateResponseData'
    QueryTemplateResponseData:
      type: object
      required:
        - query_template_id
        - query_surface_id
        - template_name
        - template_type
        - version_no
        - parameter_schema_json
        - analysis_rule_json
        - result_schema_json
        - export_policy_json
        - risk_guard_json
        - whitelist_fields
        - status
        - operation
        - created_at
        - updated_at
      properties:
        query_template_id:
          type: string
          format: uuid
        query_surface_id:
          type: string
          format: uuid
        template_name:
          type: string
        template_type:
          type: string
        template_body_ref:
          type: string
          nullable: true
        version_no:
          type: integer
          format: int32
        parameter_schema_json:
          type: object
          additionalProperties: true
        analysis_rule_json:
          type: object
          additionalProperties: true
        result_schema_json:
          type: object
          additionalProperties: true
        export_policy_json:
          type: object
          additionalProperties: true
        risk_guard_json:
          type: object
          additionalProperties: true
        whitelist_fields:
          type: array
          items:
            type: string
        status:
          type: string
        operation:
          type: string
          enum: [created, updated]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ManageTemplateGrantRequest:
      type: object
      properties:
        template_query_grant_id:
          type: string
          format: uuid
          nullable: true
        query_surface_id:
          type: string
          format: uuid
          nullable: true
        asset_object_id:
          type: string
          format: uuid
          nullable: true
        environment_id:
          type: string
          format: uuid
          nullable: true
        template_type:
          type: string
          nullable: true
        allowed_template_ids:
          type: array
          nullable: true
          items:
            type: string
            format: uuid
        execution_rule_snapshot:
          type: object
          additionalProperties: true
          nullable: true
        output_boundary_json:
          type: object
          additionalProperties: true
          nullable: true
        run_quota_json:
          type: object
          additionalProperties: true
          nullable: true
    ManageSandboxWorkspaceRequest:
      type: object
      properties:
        query_surface_id:
          type: string
          format: uuid
          nullable: true
        workspace_name:
          type: string
          nullable: true
        seat_user_id:
          type: string
          format: uuid
          nullable: true
        expire_at:
          type: string
          format: date-time
          nullable: true
        export_policy_json:
          type: object
          additionalProperties: true
          nullable: true
        clean_room_mode:
          type: string
          nullable: true
        data_residency_mode:
          type: string
          nullable: true
    ManageSensitiveExecutionPolicyRequest:
      type: object
      properties:
        sensitive_execution_policy_id:
          type: string
          format: uuid
          nullable: true
        query_surface_id:
          type: string
          format: uuid
          nullable: true
        template_query_grant_id:
          type: string
          format: uuid
          nullable: true
        sandbox_workspace_id:
          type: string
          format: uuid
          nullable: true
        policy_scope:
          type: string
          nullable: true
        execution_mode:
          type: string
          nullable: true
        output_boundary_json:
