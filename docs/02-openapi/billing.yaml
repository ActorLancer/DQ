openapi: 3.1.0
info:
  title: Billing API
  version: v1
paths:
  /api/v1/payment-jurisdictions:
    get:
      summary: List payment jurisdiction profiles
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
          description: platform_admin | platform_finance_operator | platform_risk_settlement | tenant_admin
      responses:
        "200":
          description: Jurisdiction profiles loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JurisdictionProfileListResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create or update payment jurisdiction profile
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-step-up-token
          required: false
          schema:
            type: string
        - in: header
          name: x-step-up-challenge-id
          required: false
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJurisdictionProfileRequest"
      responses:
        "200":
          description: Jurisdiction profile saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JurisdictionProfileResponse"
        "400":
          description: Invalid payload or missing step-up placeholder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payment-corridors:
    get:
      summary: List payment corridor policies
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Corridor policies loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorridorPolicyListResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create or update payment corridor policy
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-step-up-token
          required: false
          schema:
            type: string
        - in: header
          name: x-step-up-challenge-id
          required: false
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCorridorPolicyRequest"
      responses:
        "200":
          description: Corridor policy saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorridorPolicyResponse"
        "400":
          description: Invalid payload or missing step-up placeholder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payout-preferences:
    get:
      summary: List payout preferences
      tags: [Billing]
      parameters:
        - in: query
          name: beneficiary_subject_type
          required: false
          schema:
            type: string
        - in: query
          name: beneficiary_subject_id
          required: false
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-tenant-id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Payout preferences loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutPreferenceListResponse"
        "400":
          description: Invalid scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Set default payout preference
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-tenant-id
          required: false
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePayoutPreferenceRequest"
      responses:
        "200":
          description: Payout preference created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutPreferenceResponse"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden or tenant scope mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payments/intents:
    post:
      summary: Create payment intent
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
        - in: header
          name: x-step-up-token
          required: false
          schema:
            type: string
        - in: header
          name: x-step-up-challenge-id
          required: false
          schema:
            type: string
        - in: header
          name: x-idempotency-key
          required: true
          schema:
            type: string
          description: Required idempotency key. Payment intent create is a high-risk action and must also carry step-up evidence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentIntentRequest"
      responses:
        "200":
          description: Payment intent created or idempotency replayed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentResponse"
        "400":
          description: Invalid request payload or persistence failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/refunds:
    post:
      summary: Execute refund
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-tenant-id
          required: false
          schema:
            type: string
        - in: header
          name: x-user-id
          required: false
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
        - in: header
          name: x-step-up-token
          required: false
          schema:
            type: string
        - in: header
          name: x-step-up-challenge-id
          required: false
          schema:
            type: string
        - in: header
          name: x-idempotency-key
          required: true
          schema:
            type: string
          description: Required idempotency key. Refund execute is a high-risk action and must also carry step-up evidence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRefundRequest"
      responses:
        "200":
          description: Refund executed or idempotency replayed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundExecutionResponse"
        "400":
          description: Invalid payload or missing step-up placeholder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order or dispute case not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Refund conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/compensations:
    post:
      summary: Execute compensation
      tags: [Billing]
      parameters:
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-tenant-id
          required: false
          schema:
            type: string
        - in: header
          name: x-user-id
          required: false
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
        - in: header
          name: x-step-up-token
          required: false
          schema:
            type: string
        - in: header
          name: x-step-up-challenge-id
          required: false
          schema:
            type: string
        - in: header
          name: x-idempotency-key
          required: true
          schema:
            type: string
          description: Required idempotency key. Compensation execute is a high-risk action and must also carry step-up evidence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompensationRequest"
      responses:
        "200":
          description: Compensation executed or idempotency replayed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompensationExecutionResponse"
        "400":
          description: Invalid payload or missing step-up placeholder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order or dispute case not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Compensation conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payments/intents/{id}:
    get:
      summary: Query payment intent
      tags: [Billing]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment intent loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentDetailResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/billing/{order_id}:
    get:
      summary: Query billing detail by order
      tags: [Billing]
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-tenant-id
          required: false
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Billing detail loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingOrderDetailResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payments/intents/{id}/cancel:
    post:
      summary: Cancel payment intent
      tags: [Billing]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment intent canceled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Illegal status transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/orders/{id}/lock:
    post:
      summary: Lock order payment and link payment intent
      tags: [Billing]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-tenant-id
          required: false
          schema:
            type: string
          description: Buyer tenant scope for tenant-side payment lock.
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LockOrderRequest"
      responses:
        "200":
          description: Order lock completed or idempotency replayed for the same payment intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderLockResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment intent or order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Payment intent and order mismatch, price snapshot mismatch, or illegal lock state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payments/webhooks/{provider}:
    post:
      summary: Receive payment webhook callback
      description: Provider callback entrypoint with signature placeholder, idempotency, replay protection, and out-of-order guard.
      tags: [Billing]
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
        - in: header
          name: x-provider-signature
          required: false
          schema:
            type: string
        - in: header
          name: x-webhook-timestamp
          required: false
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
        - in: header
          name: x-trace-id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentWebhookRequest"
      responses:
        "200":
          description: Webhook accepted and processed (or safely ignored)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentWebhookResultResponse"
        "400":
          description: Invalid payload or persistence failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/mock/payments/{id}/simulate-success:
    post:
      summary: Simulate mock payment success callback
      description: Calls the mock payment provider in live mode, persists a developer mock case, and feeds the resulting webhook through the platform webhook handler.
      tags: [Billing]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-tenant-id
          required: false
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
        - in: header
          name: x-trace-id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MockPaymentSimulationRequest"
      responses:
        "200":
          description: Success webhook simulated and processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MockPaymentSimulationResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment intent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Unsupported provider, tenant scope mismatch, or state conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Mock provider call failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/mock/payments/{id}/simulate-fail:
    post:
      summary: Simulate mock payment fail callback
      tags: [Billing]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-tenant-id
          required: false
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
        - in: header
          name: x-trace-id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MockPaymentSimulationRequest"
      responses:
        "200":
          description: Fail webhook simulated and processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MockPaymentSimulationResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment intent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Unsupported provider, tenant scope mismatch, or state conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Mock provider call failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/mock/payments/{id}/simulate-timeout:
    post:
      summary: Simulate mock payment timeout callback
      tags: [Billing]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-role
          required: true
          schema:
            type: string
        - in: header
          name: x-tenant-id
          required: false
          schema:
            type: string
        - in: header
          name: x-request-id
          required: false
          schema:
            type: string
        - in: header
          name: x-trace-id
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MockPaymentSimulationRequest"
      responses:
        "200":
          description: Timeout webhook simulated and processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MockPaymentSimulationResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment intent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Unsupported provider, tenant scope mismatch, or state conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Mock provider call failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
          nullable: true
    ApiEnvelopeJurisdictionList:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/JurisdictionProfile"
    ApiEnvelopeJurisdiction:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/JurisdictionProfile"
    ApiEnvelopeCorridorList:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/CorridorPolicy"
    ApiEnvelopeCorridor:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/CorridorPolicy"
    ApiEnvelopePayoutPreferenceList:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/PayoutPreference"
    ApiEnvelopePayoutPreference:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PayoutPreference"
    ApiEnvelopePaymentIntent:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PaymentIntent"
    ApiEnvelopePaymentIntentDetail:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PaymentIntentDetail"
    ApiEnvelopeBillingOrderDetail:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/BillingOrderDetail"
    ApiEnvelopeOrderLock:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/OrderLock"
    ApiEnvelopePaymentWebhookResult:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PaymentWebhookResult"
    ApiEnvelopeMockPaymentSimulation:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/MockPaymentSimulation"
    JurisdictionProfile:
      type: object
      required:
        [
          jurisdiction_code,
          jurisdiction_name,
          launch_phase,
          supports_fiat_collection,
          supports_fiat_payout,
          supports_crypto_settlement,
          jurisdiction_status,
          policy_snapshot,
        ]
      properties:
        jurisdiction_code:
          type: string
        jurisdiction_name:
          type: string
        regulator_name:
          type: string
          nullable: true
        launch_phase:
          type: string
        supports_fiat_collection:
          type: boolean
        supports_fiat_payout:
          type: boolean
        supports_crypto_settlement:
          type: boolean
        jurisdiction_status:
          type: string
        policy_snapshot:
          type: object
          additionalProperties: true
    CorridorPolicy:
      type: object
      required:
        [
          corridor_policy_id,
          policy_name,
          payer_jurisdiction_code,
          payee_jurisdiction_code,
          product_scope,
          price_currency_code,
          allowed_collection_currencies,
          allowed_payout_currencies,
          route_mode,
          requires_manual_review,
          allows_crypto,
          corridor_status,
          policy_snapshot,
        ]
      properties:
        corridor_policy_id:
          type: string
        policy_name:
          type: string
        payer_jurisdiction_code:
          type: string
        payee_jurisdiction_code:
          type: string
        product_scope:
