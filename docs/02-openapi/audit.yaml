openapi: 3.1.0
info:
  title: Audit API
  version: v1
paths:
  /api/v1/audit/orders/{id}:
    get:
      summary: lookup masked audit traces for one order
      description: >
        Returns the minimal audit trace view for a single order. Tenant-scoped callers
        must stay within the buyer or seller org bound to the order. Every lookup is
        mirrored into `audit.access_audit` and `ops.system_log`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: order audit traces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderAuditResponse"
        "400":
          description: bad request
        "403":
          description: forbidden
        "404":
          description: order not found
  /api/v1/audit/traces:
    get:
      summary: search masked audit traces
      description: >
        Returns the global masked audit trace search result. Supported filters cover
        `order_id`, `ref_type`, `ref_id`, `request_id`, `trace_id`, `action_name`,
        and `result_code`. Tenant-scoped callers must provide `order_id` or
        `ref_type=order + ref_id`.
      parameters:
        - name: order_id
          in: query
          schema:
            type: string
            format: uuid
        - name: ref_type
          in: query
          schema:
            type: string
        - name: ref_id
          in: query
          schema:
            type: string
            format: uuid
        - name: request_id
          in: query
          schema:
            type: string
        - name: trace_id
          in: query
          schema:
            type: string
        - name: action_name
          in: query
          schema:
            type: string
        - name: result_code
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: audit trace page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditTracePageResponse"
        "400":
          description: bad request
        "403":
          description: forbidden
components:
  schemas:
    AuditTrace:
      type: object
      required:
        - event_schema_version
        - event_class
        - domain_name
        - ref_type
        - action_name
        - result_code
      properties:
        audit_id:
          type: string
        event_schema_version:
          type: string
        event_class:
          type: string
        domain_name:
          type: string
        ref_type:
          type: string
        ref_id:
          type: string
        actor_id:
          type: string
        actor_org_id:
          type: string
        action_name:
          type: string
        result_code:
          type: string
        error_code:
          type: string
        request_id:
          type: string
        trace_id:
          type: string
        tx_hash:
          type: string
        evidence_manifest_id:
          type: string
        event_hash:
          type: string
        occurred_at:
          type: string
          format: date-time
    AuditTracePage:
      type: object
      required: [total, page, page_size, items]
      properties:
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditTrace"
    OrderAuditView:
      type: object
      required:
        - order_id
        - buyer_org_id
        - seller_org_id
        - status
        - payment_status
        - total
        - page
        - page_size
        - traces
      properties:
        order_id:
          type: string
          format: uuid
        buyer_org_id:
          type: string
          format: uuid
        seller_org_id:
          type: string
          format: uuid
        status:
          type: string
        payment_status:
          type: string
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        traces:
          type: array
          items:
            $ref: "#/components/schemas/AuditTrace"
    AuditTracePageResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/AuditTracePage"
    OrderAuditResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/OrderAuditView"
