openapi: 3.1.0
info:
  title: Ops API
  version: v1
  description: |
    Ops / internal control-plane contract archive for the current implementation stage.
    Notification control-plane endpoints are frozen around the formal chain
    `notification.requested -> dtp.notification.dispatch -> notification-worker`.
paths:
  /health/live:
    get:
      summary: liveness probe
      tags: [OpsCore]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseString"
              example:
                success: true
                data: ok
  /health/ready:
    get:
      summary: readiness probe
      tags: [OpsCore]
      responses:
        "200":
          description: ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseString"
              example:
                success: true
                data: ready
  /health/deps:
    get:
      summary: dependency connectivity
      tags: [OpsCore]
      responses:
        "200":
          description: dependency checks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseDependenciesReport"
  /internal/runtime:
    get:
      summary: runtime mode and build metadata
      tags: [OpsCore]
      responses:
        "200":
          description: runtime config
  /internal/dev/trace-links:
    get:
      summary: local observability and dependency links
      tags: [OpsCore]
      responses:
        "200":
          description: trace links
  /internal/dev/overview:
    get:
      summary: developer overview including mode and recent event snapshots
      tags: [OpsCore]
      responses:
        "200":
          description: developer overview
  /internal/notifications/templates/preview:
    post:
      summary: preview notification template rendering before dispatch
      tags: [NotificationOps]
      description: |
        Renders the active PostgreSQL-backed notification template without publishing to Kafka.
        The request body uses the same frozen notification envelope fields as the formal
        `notification.requested` chain, including `source_event`, `subject_refs`,
        `links`, retry policy, and V1 `mock-log` channel defaults.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreviewTemplateRequest"
            example:
              notification_code: payment.succeeded
              audience_scope: buyer
              template_code: NOTIFY_PAYMENT_SUCCEEDED_V1
              recipient:
                kind: user
                address: buyer@example.test
                display_name: Buyer
              variables:
                subject: Payment success notification
                headline: Buyer escrow completed and order is pending delivery
                order_id: 11111111-1111-1111-1111-111111111111
                order_no: ORD-NOTIF-013
                product_title: Example SKU
                seller_org_name: Example Seller Org
                order_amount: "128.00"
                currency_code: CNY
                payment_status: buyer_locked
                delivery_status: pending_delivery
                action_label: View order
                action_href: /trade/orders/11111111-1111-1111-1111-111111111111
              source_event:
                aggregate_type: billing.billing_event
                aggregate_id: 11111111-1111-1111-1111-111111111111
                event_type: billing.event.recorded
                target_topic: dtp.outbox.domain-events
              subject_refs:
                - ref_type: order
                  ref_id: 11111111-1111-1111-1111-111111111111
              links:
                - link_code: order_detail
                  href: /trade/orders/11111111-1111-1111-1111-111111111111
              language_code: zh-CN
      responses:
        "200":
          description: preview ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponsePreviewTemplateResponse"
              example:
                success: true
                data:
                  event_id: 2d2a5fe9-97c7-42d8-96cb-1fc1c8cbb2a1
                  aggregate_id: 11111111-1111-1111-1111-111111111111
                  request_id: req-notif013-preview
                  trace_id: trace-notif013-preview
                  template_code: NOTIFY_PAYMENT_SUCCEEDED_V1
                  channel: mock-log
                  language_code: zh-CN
                  requested_language_code: zh-CN
                  version_no: 2
                  template_enabled: true
                  template_status: active
                  template_fallback_used: false
                  body_fallback_used: false
                  variable_schema:
                    type: object
                    required:
                      - subject
                      - headline
                      - order_id
                  template_metadata:
                    scene: payment.succeeded
                    owner: notification-worker
                  title: Payment success notification
                  body: Buyer escrow completed and order is pending delivery.
        "400":
          description: invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: render failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /internal/notifications/send:
    post:
      summary: publish a frozen notification.requested envelope to Kafka
      tags: [NotificationOps]
      description: |
        Publishes a single `notification.requested` envelope to the formal notification topic
        `dtp.notification.dispatch`. V1 real delivery stays on `mock-log`; `email` and
        `webhook` remain adapter boundaries only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNotificationRequest"
            example:
              notification_code: payment.succeeded
              audience_scope: buyer
              template_code: NOTIFY_PAYMENT_SUCCEEDED_V1
              recipient:
                kind: user
                address: buyer@example.test
                display_name: Buyer
              variables:
                subject: Payment success notification
                headline: Buyer escrow completed and order is pending delivery
                order_id: 22222222-2222-2222-2222-222222222222
                order_no: ORD-NOTIF-013-RETRY
                product_title: Example SKU
                seller_org_name: Example Seller Org
                order_amount: "128.00"
                currency_code: CNY
                payment_status: buyer_locked
                delivery_status: pending_delivery
                action_label: View order
                action_href: /trade/orders/22222222-2222-2222-2222-222222222222
              simulate_failures: 1
              retry_policy:
                max_attempts: 2
                backoff_ms: 1000
              source_event:
                aggregate_type: billing.billing_event
                aggregate_id: 22222222-2222-2222-2222-222222222222
                event_type: billing.event.recorded
                target_topic: dtp.outbox.domain-events
              subject_refs:
                - ref_type: order
                  ref_id: 22222222-2222-2222-2222-222222222222
              links:
                - link_code: order_detail
                  href: /trade/orders/22222222-2222-2222-2222-222222222222
      responses:
        "200":
          description: notification accepted for dispatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSendNotificationResponse"
              example:
                success: true
                data:
                  event_id: 0b752495-6bd3-4f5b-9cbc-c54b0a0f04dc
                  event_type: notification.requested
                  topic: dtp.notification.dispatch
                  request_id: req-notif013-send
                  trace_id: trace-notif013-send
                  aggregate_id: 27cc4028-6b17-4ff3-b9aa-2bf79195776d
                  idempotency_key: notification:payment.succeeded:buyer:billing.billing_event:22222222-2222-2222-2222-222222222222:billing.event.recorded:buyer_example.test
        "400":
          description: invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: publish failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /internal/notifications/audit/search:
    post:
      summary: lookup notification dispatch records, retry timeline, and audit traces
      tags: [NotificationOps]
      description: |
        Returns notification dispatch records with rendered variables, channel result,
        retry timeline, dead-letter status, and audit timeline. Filters
        `aggregate_type / event_type / target_topic` apply to the formal notification
        envelope and its canonical outbox route, not the upstream business `source_event`.
        At least one primary filter plus `reason` and `step_up_ticket` is required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationAuditSearchRequest"
            example:
              order_id: 22222222-2222-2222-2222-222222222222
              aggregate_type: notification.dispatch_request
              event_type: notification.requested
              target_topic: dtp.notification.dispatch
              notification_code: payment.succeeded
              template_code: NOTIFY_PAYMENT_SUCCEEDED_V1
              limit: 20
              reason: trace notification delivery for incident review
              step_up_ticket: step-up-local-1
      responses:
        "200":
          description: lookup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseNotificationAuditSearchResponse"
              example:
                success: true
                data:
                  request_id: req-notif013-lookup
                  trace_id: trace-notif013-lookup
                  filters:
                    order_id: 22222222-2222-2222-2222-222222222222
                    case_id: null
                    aggregate_type: notification.dispatch_request
                    event_type: notification.requested
                    target_topic: dtp.notification.dispatch
                    template_code: NOTIFY_PAYMENT_SUCCEEDED_V1
                    notification_code: payment.succeeded
                    event_id: 0b752495-6bd3-4f5b-9cbc-c54b0a0f04dc
                    limit: 20
                  total: 1
                  records:
                    - event_id: 0b752495-6bd3-4f5b-9cbc-c54b0a0f04dc
                      aggregate_id: 27cc4028-6b17-4ff3-b9aa-2bf79195776d
                      aggregate_type: notification.dispatch_request
                      event_type: notification.requested
                      target_topic: dtp.notification.dispatch
                      request_id: req-notif013-send
                      trace_id: trace-notif013-send
                      notification_code: payment.succeeded
                      template_code: NOTIFY_PAYMENT_SUCCEEDED_V1
                      channel: mock-log
                      audience_scope: buyer
                      recipient:
                        kind: user
                        address: buyer@example.test
                        display_name: Buyer
                      source_event:
                        aggregate_type: billing.billing_event
                        aggregate_id: 22222222-2222-2222-2222-222222222222
                        event_type: billing.event.recorded
                        target_topic: dtp.outbox.domain-events
                      subject_refs:
                        - ref_type: order
                          ref_id: 22222222-2222-2222-2222-222222222222
                      links:
                        - link_code: order_detail
                          href: /trade/orders/22222222-2222-2222-2222-222222222222
                      rendered_variables:
                        subject: Payment success notification
                        order_id: 22222222-2222-2222-2222-222222222222
                      current_status: processed
                      current_attempt: 1
                      title: Payment success notification
                      body: Buyer escrow completed and order is pending delivery.
                      channel_result:
                        provider: mock-log
                        status: success
                      retry_timeline:
                        - status: processed
                          message_text: notification sent via mock-log
                          created_at: "2026-04-22T12:00:00Z"
                          attempt: 1
                          error: null
                          payload:
                            template_code: NOTIFY_PAYMENT_SUCCEEDED_V1
                            channel: mock-log
                      audit_timeline:
                        - action_name: notification.dispatch.sent
                          result_code: success
                          event_time: "2026-04-22T12:00:00Z"
                          metadata:
                            template_code: NOTIFY_PAYMENT_SUCCEEDED_V1
                            channel: mock-log
                      dead_letter: null
        "400":
          description: missing filter, reason, or step-up marker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: lookup failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /internal/notifications/dead-letters/{dead_letter_event_id}/replay:
    post:
      summary: dry-run or replay a notification dead letter
      tags: [NotificationOps]
      description: |
        Replays a notification dead letter produced by `notification-worker`.
        `dry_run=true` previews the rendered template and audit trail without creating
        side effects. `dry_run=false` republishes a new `notification.requested`
        envelope back to `dtp.notification.dispatch` and records replay audit events.
      parameters:
        - in: path
          name: dead_letter_event_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplayDeadLetterRequest"
            example:
              dry_run: false
              reason: manual replay after mock-log recovery
              step_up_ticket: step-up-local-1
              request_id: req-notif013-replay
              trace_id: trace-notif013-replay
      responses:
        "200":
          description: replay request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseReplayDeadLetterResponse"
              example:
                success: true
                data:
                  dead_letter_event_id: 695646ea-35e6-4fd3-955e-a4336f455bb6
                  original_event_id: 5335bc1d-c10e-496f-8123-a2c5a2cca5fc
                  replay_event_id: c6b7dd09-355c-45be-a903-2433e3bb75df
                  request_id: req-notif013-replay
                  trace_id: trace-notif013-replay
                  dry_run: false
                  status: reprocess_requested
                  notification_topic: dtp.notification.dispatch
                  dead_letter_topic: dtp.dead-letter
                  template_code: NOTIFY_PAYMENT_SUCCEEDED_V1
                  channel: mock-log
                  title: Payment success notification
                  body: Buyer escrow completed and order is pending delivery.
        "400":
          description: invalid replay request or non-notification dead letter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: dead letter not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: dead letter already replayed or replay in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: replay failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    ApiResponseString:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: string
    ApiResponseDependenciesReport:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/DependenciesReport"
    ApiResponseSendNotificationResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/SendNotificationResponse"
    ApiResponsePreviewTemplateResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/PreviewTemplateResponse"
    ApiResponseReplayDeadLetterResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/ReplayDeadLetterResponse"
    ApiResponseNotificationAuditSearchResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/NotificationAuditSearchResponse"
    DependenciesReport:
      type: object
      required: [ready, checks]
      properties:
        ready:
          type: boolean
        checks:
          type: array
          items:
            $ref: "#/components/schemas/DependencyStatus"
    DependencyStatus:
      type: object
      required: [name, endpoint, reachable]
      properties:
        name:
          type: string
        endpoint:
          type: string
        reachable:
          type: boolean
    SendNotificationRequest:
      type: object
      required: [notification_code, audience_scope, recipient]
      properties:
        event_id:
          type: string
          format: uuid
        aggregate_id:
          type: string
          format: uuid
        notification_code:
          type: string
          enum:
            - order.created
            - payment.succeeded
            - payment.failed
            - order.pending_delivery
            - delivery.completed
            - order.pending_acceptance
            - acceptance.passed
            - acceptance.rejected
            - dispute.escalated
            - refund.completed
            - compensation.completed
            - settlement.frozen
            - settlement.resumed
        audience_scope:
          type: string
          enum: [buyer, seller, ops]
        template_code:
          type: string
        channel:
          type: string
          description: V1 active channel is mock-log; email/webhook remain reserved adapters.
          enum: [mock-log, email, webhook]
        recipient:
          $ref: "#/components/schemas/NotificationRecipient"
        variables:
          $ref: "#/components/schemas/JsonObject"
        metadata:
          $ref: "#/components/schemas/JsonObject"
        source_event:
          $ref: "#/components/schemas/NotificationSourceEvent"
        subject_refs:
          type: array
          items:
            $ref: "#/components/schemas/NotificationSubjectRef"
        links:
          type: array
          items:
            $ref: "#/components/schemas/NotificationActionLink"
        idempotency_key:
          type: string
        request_id:
          type: string
        trace_id:
          type: string
        retry_policy:
          $ref: "#/components/schemas/NotificationRetryPolicy"
        simulate_failures:
          type: integer
          minimum: 0
          description: Local-only fault injection count used to exercise retry and DLQ paths.
    SendNotificationResponse:
      type: object
      required: [event_id, event_type, topic, request_id, trace_id, aggregate_id, idempotency_key]
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
          example: notification.requested
        topic:
          type: string
          example: dtp.notification.dispatch
        request_id:
          type: string
        trace_id:
          type: string
        aggregate_id:
          type: string
          format: uuid
        idempotency_key:
          type: string
    PreviewTemplateRequest:
      allOf:
        - $ref: "#/components/schemas/SendNotificationRequest"
        - type: object
          properties:
            language_code:
              type: string
              description: Optional override for template language selection.
    PreviewTemplateResponse:
      type: object
      required:
        - event_id
        - aggregate_id
        - request_id
        - trace_id
        - template_code
        - channel
        - language_code
        - requested_language_code
        - version_no
        - template_enabled
        - template_status
        - template_fallback_used
        - body_fallback_used
        - variable_schema
        - template_metadata
        - title
        - body
      properties:
        event_id:
          type: string
          format: uuid
        aggregate_id:
          type: string
          format: uuid
        request_id:
          type: string
        trace_id:
          type: string
        template_code:
          type: string
        channel:
          type: string
        language_code:
          type: string
        requested_language_code:
          type: string
        version_no:
          type: integer
        template_enabled:
          type: boolean
        template_status:
          type: string
        template_fallback_used:
          type: boolean
        body_fallback_used:
          type: boolean
        variable_schema:
          $ref: "#/components/schemas/JsonObject"
        template_metadata:
          $ref: "#/components/schemas/JsonObject"
        title:
          type: string
        body:
          type: string
    ReplayDeadLetterRequest:
      type: object
      required: [dry_run, reason, step_up_ticket]
      properties:
        dry_run:
          type: boolean
          default: true
        reason:
          type: string
        step_up_ticket:
          type: string
          description: Step-up marker recorded into audit metadata for replay actions.
        request_id:
          type: string
        trace_id:
          type: string
    ReplayDeadLetterResponse:
      type: object
      required:
        - dead_letter_event_id
        - original_event_id
        - request_id
        - trace_id
        - dry_run
        - status
        - notification_topic
        - dead_letter_topic
        - template_code
        - channel
        - title
        - body
      properties:
        dead_letter_event_id:
          type: string
          format: uuid
        original_event_id:
          type: string
          format: uuid
        replay_event_id:
          type: string
          format: uuid
          nullable: true
        request_id:
          type: string
        trace_id:
          type: string
        dry_run:
          type: boolean
        status:
          type: string
          enum: [dry_run_ready, reprocess_requested]
        notification_topic:
          type: string
          example: dtp.notification.dispatch
        dead_letter_topic:
          type: string
          example: dtp.dead-letter
        template_code:
          type: string
        channel:
          type: string
        title:
          type: string
        body:
          type: string
    NotificationAuditSearchRequest:
      type: object
      required: [reason, step_up_ticket]
      description: At least one primary filter is required.
      properties:
        order_id:
          type: string
          format: uuid
        case_id:
          type: string
          format: uuid
        aggregate_type:
          type: string
          example: notification.dispatch_request
        event_type:
          type: string
          example: notification.requested
        target_topic:
          type: string
          example: dtp.notification.dispatch
        template_code:
          type: string
        notification_code:
          type: string
        event_id:
          type: string
          format: uuid
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 20
        reason:
          type: string
        step_up_ticket:
          type: string
        request_id:
          type: string
        trace_id:
          type: string
    NotificationAuditSearchResponse:
      type: object
      required: [request_id, trace_id, filters, total, records]
      properties:
        request_id:
          type: string
        trace_id:
          type: string
        filters:
          $ref: "#/components/schemas/NotificationAuditSearchFilters"
        total:
          type: integer
        records:
          type: array
          items:
            $ref: "#/components/schemas/NotificationAuditSearchRecord"
    NotificationAuditSearchFilters:
      type: object
      required: [limit]
      properties:
        order_id:
          type: string
          format: uuid
          nullable: true
        case_id:
          type: string
          format: uuid
          nullable: true
        aggregate_type:
          type: string
          nullable: true
        event_type:
          type: string
          nullable: true
        target_topic:
          type: string
          nullable: true
        template_code:
          type: string
          nullable: true
        notification_code:
          type: string
          nullable: true
        event_id:
          type: string
          format: uuid
          nullable: true
        limit:
          type: integer
    NotificationAuditSearchRecord:
      type: object
      required:
        - event_id
        - aggregate_id
        - aggregate_type
        - event_type
        - target_topic
        - request_id
        - trace_id
        - notification_code
        - template_code
        - channel
        - audience_scope
        - recipient
        - source_event
        - subject_refs
        - links
        - rendered_variables
        - current_status
        - retry_timeline
        - audit_timeline
      properties:
        event_id:
          type: string
          format: uuid
        aggregate_id:
          type: string
          format: uuid
        aggregate_type:
          type: string
        event_type:
          type: string
        target_topic:
          type: string
        request_id:
          type: string
        trace_id:
          type: string
        notification_code:
          type: string
        template_code:
          type: string
        channel:
          type: string
        audience_scope:
          type: string
        recipient:
          $ref: "#/components/schemas/NotificationRecipient"
        source_event:
          $ref: "#/components/schemas/NotificationSourceEvent"
        subject_refs:
          type: array
          items:
            $ref: "#/components/schemas/NotificationSubjectRef"
        links:
          type: array
          items:
            $ref: "#/components/schemas/NotificationActionLink"
        rendered_variables:
          $ref: "#/components/schemas/JsonObject"
        current_status:
          type: string
        current_attempt:
          type: integer
          nullable: true
        title:
          type: string
          nullable: true
        body:
          type: string
          nullable: true
        channel_result:
          $ref: "#/components/schemas/JsonObject"
        retry_timeline:
          type: array
          items:
            $ref: "#/components/schemas/NotificationDispatchTimelineEntry"
        audit_timeline:
          type: array
          items:
            $ref: "#/components/schemas/NotificationAuditTimelineEntry"
        dead_letter:
          $ref: "#/components/schemas/NotificationDeadLetterRecord"
    NotificationDispatchTimelineEntry:
      type: object
      required: [status, message_text, created_at, payload]
      properties:
        status:
          type: string
        message_text:
          type: string
        created_at:
          type: string
        attempt:
          type: integer
          nullable: true
        error:
          type: string
          nullable: true
        payload:
          $ref: "#/components/schemas/JsonObject"
